<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Giải Đấu Pickleball - Robin Round</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --secondary: #004e89;
            --accent: #ffd166;
            --dark: #0a0e17;
            --dark-card: #111827;
            --dark-card2: #1a2235;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --green: #22c55e;
            --red: #ef4444;
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,78,137,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255,209,102,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #000;
            padding: 6px 20px;
            border-radius: 50px;
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,107,53,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,107,53,0.5); }
        }

        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
        }

        .header-line {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            margin: 20px auto 0;
            border-radius: 2px;
        }

        /* Section Titles */
        .section-title {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 40px 0 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .section-title .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .section-title .icon.rank { background: linear-gradient(135deg, var(--primary), #ff8f5e); }
        .section-title .icon.match { background: linear-gradient(135deg, var(--secondary), #0077b6); }

        .section-title h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title h2 span {
            color: var(--primary);
        }

        .section-title .match-count {
            margin-left: auto;
            background: var(--dark-card2);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* Loading */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Ranking Table */
        .ranking-table-wrapper {
            background: var(--dark-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table thead th {
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(0,78,137,0.15));
            padding: 14px 16px;
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            color: var(--accent);
            border-bottom: 2px solid var(--primary);
            white-space: nowrap;
        }

        .ranking-table thead th:first-child {
            text-align: center;
            width: 60px;
        }

        .ranking-table tbody tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border);
        }

        .ranking-table tbody tr:hover {
            background: rgba(255,107,53,0.05);
        }

        .ranking-table tbody tr:last-child { border-bottom: none; }

        .ranking-table tbody td {
            padding: 12px 16px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .ranking-table tbody td:first-child {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 0.85rem;
        }

        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b8690e); color: #fff; }
        .rank-other { background: var(--dark-card2); color: var(--text-muted); }

        .player-name-cell {
            text-align: left !important;
            font-weight: 500 !important;
        }

        .stat-cell {
            font-weight: 600;
            color: var(--accent);
        }

        /* Match Cards */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .match-card {
            background: var(--dark-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255,107,53,0.15);
            border-color: rgba(255,107,53,0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
        }

        .match-round {
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 3px 10px;
            background: var(--dark-card2);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .match-status {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-status.completed {
            background: rgba(34,197,94,0.15);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.3);
        }

        .match-status.pending {
            background: rgba(255,209,102,0.15);
            color: var(--accent);
            border: 1px solid rgba(255,209,102,0.3);
        }

        .match-card-body {
            padding: 20px 16px;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .match-team {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .match-team-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .match-team-players {
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .match-team-players .amp {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .match-vs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .vs-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: #000;
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .match-score .score {
            padding: 4px 12px;
            border-radius: 8px;
            min-width: 36px;
            text-align: center;
        }

        .match-score .score.team1 {
            background: rgba(255,107,53,0.15);
            color: var(--primary);
            border: 1px solid rgba(255,107,53,0.3);
        }

        .match-score .score.team2 {
            background: rgba(0,78,137,0.2);
            color: #4da6ff;
            border: 1px solid rgba(0,78,137,0.4);
        }

        .match-score .separator {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .match-wins {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .win-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .win-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .win-dot.t1 { background: var(--primary); }
        .win-dot.t2 { background: #4da6ff; }

        .win-value {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .no-score {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* Error */
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: var(--red);
        }

        .error-box h3 { margin-bottom: 8px; }
        .error-box p { color: var(--text-muted); font-size: 0.9rem; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .header { padding: 24px 12px 20px; }
            .matches-grid { grid-template-columns: 1fr; }
            .ranking-table { font-size: 0.85rem; }
            .ranking-table thead th,
            .ranking-table tbody td { padding: 10px 8px; }
            .section-title h2 { font-size: 1.3rem; }
        }

        @media (max-width: 480px) {
            .matches-grid { grid-template-columns: 1fr; }
            .match-team-players { font-size: 0.85rem; }
            .match-score { font-size: 1.3rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--dark-card2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-badge">🏓 Robin Round Tournament</div>
        <h1>Giải Đấu Pickleball</h1>
        <p>Bảng xếp hạng & Lịch thi đấu</p>
        <div class="header-line"></div>
    </div>

    <!-- Ranking Section -->
    <div class="section-title">
        <div class="icon rank">🏆</div>
        <h2>Bảng <span>Xếp Hạng</span></h2>
    </div>
    <div id="ranking-container">
        <div class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Đang tải bảng xếp hạng...</div>
        </div>
    </div>

    <!-- Matches Section -->
    <div class="section-title">
        <div class="icon match">⚡</div>
        <h2>Lịch Thi Đấu & <span>Kết Quả</span></h2>
        <div class="match-count" id="match-count"></div>
    </div>
    <div id="matches-container">
        <div class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Đang tải lịch thi đấu...</div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>🏓 Dữ liệu được đồng bộ từ Google Sheets</p>
    </div>
</div>

<script>
    const SHEET_ID = '1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek';
    const BASE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

    function fetchSheet(sheetName, range) {
        const url = `${BASE_URL}?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
        return fetch(url)
            .then(res => res.text())
            .then(text => {
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!jsonStr) throw new Error('Không thể parse dữ liệu từ Google Sheets');
                return JSON.parse(jsonStr[1]);
            });
    }

    function getCellValue(row, colIndex) {
        if (!row.c || !row.c[colIndex]) return '';
        return row.c[colIndex].v != null ? row.c[colIndex].v : '';
    }

    // Render Ranking Table
    function renderRanking(data) {
        const container = document.getElementById('ranking-container');
        const table = data.table;
        if (!table || !table.rows || table.rows.length === 0) {
            container.innerHTML = '<div class="error-box"><h3>Không có dữ liệu</h3><p>Không tìm thấy dữ liệu bảng xếp hạng.</p></div>';
            return;
        }

        const headers = table.cols.map(col => col.label || '');
        const rows = table.rows;

        let html = `<div class="ranking-table-wrapper">
            <table class="ranking-table">
                <thead><tr>
                    <th>#</th>
                    ${headers.map(h => `<th>${h}</th>`).join('')}
                </tr></thead>
                <tbody>`;

        rows.forEach((row, idx) => {
            const hasData = row.c && row.c.some(cell => cell && cell.v !== '' && cell.v !== null);
            if (!hasData) return;

            const rankClass = idx < 3 ? `rank-${idx + 1}` : 'rank-other';
            html += `<tr>
                <td><span class="rank-badge ${rankClass}">${idx + 1}</span></td>`;
            
            for (let i = 0; i < headers.length; i++) {
                const val = getCellValue(row, i);
                const isPlayerName = i === 0;
                const isStat = i >= 1;
                html += `<td class="${isPlayerName ? 'player-name-cell' : ''} ${isStat ? 'stat-cell' : ''}">${val}</td>`;
            }
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    // Render Match Cards
    function renderMatches(data) {
        const container = document.getElementById('matches-container');
        const countEl = document.getElementById('match-count');
        const table = data.table;
        
        if (!table || !table.rows || table.rows.length === 0) {
            container.innerHTML = '<div class="error-box"><h3>Không có dữ liệu</h3><p>Không tìm thấy dữ liệu lịch thi đấu.</p></div>';
            countEl.textContent = '';
            return;
        }

        // Column mapping based on user request:
        // A: index 0, B: index 1, C: index 2, D: index 3, E: index 4, F: index 5, G: index 6, H: index 7, I: index 8, J: index 9
        // Team 1 players: B (1) & C (2)
        // Team 2 players: D (3) & E (4)
        // Team 1 score: G (6)
        // Team 2 score: H (7)
        // Team 1 wins: I (8)
        // Team 2 wins: J (9)
        // Round/Match info: A (0)

        const rows = table.rows;
        let matchCount = 0;
        let html = '<div class="matches-grid">';

        rows.forEach((row, idx) => {
            const hasData = row.c && row.c.some(cell => cell && cell.v !== '' && cell.v !== null);
            if (!hasData) return;
            matchCount++;

            const roundInfo = getCellValue(row, 0);
            const team1_p1 = getCellValue(row, 1);
            const team1_p2 = getCellValue(row, 2);
            const team2_p1 = getCellValue(row, 3);
            const team2_p2 = getCellValue(row, 4);
            const team1_score = getCellValue(row, 6);
            const team2_score = getCellValue(row, 7);
            const team1_wins = getCellValue(row, 8);
            const team2_wins = getCellValue(row, 9);

            const hasScore = team1_score !== '' && team2_score !== '';
            const statusClass = hasScore ? 'completed' : 'pending';
            const statusText = hasScore ? 'Hoàn thành' : 'Chờ đấu';

            const delay = idx * 0.05;

            html += `
                <div class="match-card" style="animation-delay: ${delay}s">
                    <div class="match-card-header">
                        <span class="match-round">${roundInfo || 'Trận ' + matchCount}</span>
                        <span class="match-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="match-card-body">
                        <div class="match-teams">
                            <div class="match-team">
                                <span class="match-team-label">Đội 1</span>
                                <div class="match-team-players">
                                    ${team1_p1}<br><span class="amp">&</span><br>${team1_p2}
                                </div>
                            </div>
                            <div class="match-vs">
                                <div class="vs-badge">VS</div>
                                ${hasScore ? `
                                    <div class="match-score">
                                        <span class="score team1">${team1_score}</span>
                                        <span class="separator">-</span>
                                        <span class="score team2">${team2_score}</span>
                                    </div>
                                ` : '<span class="no-score">Chưa thi đấu</span>'}
                            </div>
                            <div class="match-team">
                                <span class="match-team-label">Đội 2</span>
                                <div class="match-team-players">
                                    ${team2_p1}<br><span class="amp">&</span><br>${team2_p2}
                                </div>
                            </div>
                        </div>
                        ${hasScore ? `
                            <div class="match-wins">
                                <div class="win-label">
                                    <span class="win-dot t1"></span>
                                    Đội 1 thắng: <span class="win-value">${team1_wins || '-'}</span>
                                </div>
                                <div class="win-label">
                                    Đội 2 thắng: <span class="win-value">${team2_wins || '-'}</span>
                                    <span class="win-dot t2"></span>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;
        countEl.textContent = `${matchCount} trận đấu`;
    }

    // Initialize
    async function init() {
        try {
            const [rankingRes, matchesRes] = await Promise.all([
                fetchSheet('danhsachvdv', 'E1:I25'),
                fetchSheet('lichthidau', 'A:J')
            ]);

            renderRanking(rankingRes);
            renderMatches(matchesRes);
        } catch (err) {
            console.error(err);
            document.getElementById('ranking-container').innerHTML = `
                <div class="error-box">
                    <h3>⚠️ Lỗi tải dữ liệu</h3>
                    <p>${err.message}</p>
                    <p style="margin-top:8px;">Vui lòng đảm bảo Google Sheet đã được chia sẻ công khai.</p>
                </div>
            `;
            document.getElementById('matches-container').innerHTML = `
                <div class="error-box">
                    <h3>⚠️ Lỗi tải dữ liệu</h3>
                    <p>${err.message}</p>
                </div>
            `;
        }
    }

    init();
</script>

</body>
</html>
