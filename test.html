<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Manager Pro</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}
.container{max-width:500px;margin:auto}
input,textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}
.btn-primary{background:#6366f1;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-info{background:#06b6d4;color:#fff}
.hidden{display:none}
#status{margin-top:10px;font-size:14px}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔒 Đăng nhập</h2>
  <input type="password" id="pass" placeholder="Nhập mật khẩu">
  <button class="btn-primary" onclick="login()">Đăng nhập</button>
</div>

<!-- MAIN -->
<div id="app" class="hidden">

  <h2>🏓 Pickleball Manager</h2>

  <textarea id="players" rows="8" placeholder="Mỗi dòng 1 VĐV"></textarea>

  <button class="btn-warning" onclick="save()">💾 Lưu danh sách</button>
  <button class="btn-info" onclick="create()">🚀 Tạo lịch</button>

  <div id="status"></div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyhzlTYzLTTVQB5HpvtrxZ-NMQB0HwT8dQH_MchZbN9xamE5lTvjh-N-RgNU730NMM9tw/exec";
const PASS = "123";

/* ===== LOGIN ===== */
function login(){
  if(document.getElementById("pass").value === PASS){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    load(); // 🔥 auto load
  }else{
    alert("Sai mật khẩu");
  }
}

/* ===== LOAD (GET) ===== */
function load(){

  const url = API + "?action=loadPlayers";

  setStatus("⏳ Đang tải danh sách...");

  fetch(url)
  .then(r => r.json())
  .then(data => {

    console.log("LOAD:", data);

    if(data.success){
      document.getElementById("players").value = data.players.join("\n");
      setStatus("✅ Đã tải " + data.count + " VĐV");
    }else{
      setStatus("❌ " + data.error);
    }

  })
  .catch(err=>{
    console.error(err);
    setStatus("❌ Lỗi kết nối API");
  });
}

/* ===== SAVE ===== */
function save(){

  const list = document.getElementById("players").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x);

  setStatus("⏳ Đang lưu...");

  fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"savePlayers",
      players:list
    })
  })
  .then(r => r.json())
  .then(data=>{
    console.log("SAVE:", data);
    setStatus("✅ " + (data.message || "Đã lưu"));
  })
  .catch(()=>{
    setStatus("❌ Lỗi lưu dữ liệu");
  });
}

/* ===== CREATE ===== */
function create(){

  setStatus("⏳ Đang tạo lịch...");

  fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"createSchedule"
    })
  })
  .then(r => r.json())
  .then(data=>{
    console.log("CREATE:", data);
    setStatus("🔥 " + data.message);
  })
  .catch(()=>{
    setStatus("❌ Lỗi tạo lịch");
  });
}

/* ===== UI ===== */
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
