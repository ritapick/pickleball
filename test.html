                        <body>
                            <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* CSS */
:root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --green: #22c55e; --orange: #f59e0b; --purple: #6366f1; --red: #ef4444; }
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
.container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }

/* UI Components */
.card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
h1, h2 { text-align: center; }
h1 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(to right, #4ade80, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
h2 { font-size: 18px; color: #94a3b8; margin-bottom: 15px; }

input, textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 10px; font-size: 15px; margin-bottom: 10px; transition: 0.2s; }
input:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
textarea { min-height: 150px; font-family: monospace; resize: vertical; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; color: white; margin-top: 5px; }
.btn:active { transform: scale(0.98); }
.btn-green { background: var(--green); box-shadow: 0 4px 12px rgba(34,197,94,0.25); }
.btn-orange { background: var(--orange); box-shadow: 0 4px 12px rgba(245,158,11,0.25); }
.btn-purple { background: var(--purple); box-shadow: 0 4px 12px rgba(99,102,241,0.25); }
.btn-blue { background: #0ea5e9; box-shadow: 0 4px 12px rgba(14,165,233,0.25); }
.btn-red { background: var(--red); }

.hidden { display: none !important; }

.status { padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: 500; margin-top: 10px; }
.status.loading { background: rgba(245,158,11,0.1); color: #fcd34d; }
.status.success { background: rgba(34,197,94,0.1); color: #86efac; }
.status.error { background: rgba(239,68,68,0.1); color: #fca5a5; }
.badge { display: inline-block; background: rgba(34,197,94,0.2); color: #4ade80; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 100; }
.modal { background: var(--card); padding: 24px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #475569; }
.modal p { color: #94a3b8; margin: 10px 0 20px; font-size: 14px; }
.btn-group { display: flex; gap: 10px; }
.btn-group button { flex: 1; }

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.loader { width: 18px; height: 18px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
</style>
</head>
<body>

<div class="container">
  
  <!-- LOGIN SCREEN -->
  <div id="screenLogin" class="card">
    <div style="text-align:center; font-size:40px; margin-bottom:10px;">🏓</div>
    <h1>Pickleball Manager</h1>
    <p style="text-align:center; color:#64748b; font-size:13px; margin-bottom:20px;">Nhập mật khẩu để quản lý giải đấu</p>
    <input type="password" id="passInput" placeholder="Mật khẩu..." onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-green" onclick="login()">🔓 Đăng nhập</button>
    <div id="loginMsg" class="status error hidden" style="margin-top:12px"></div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="screenMain" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h1 style="margin:0; font-size:20px;">🏓 Dashboard</h1>
      <button class="btn btn-red" style="width:auto; padding:8px 12px; font-size:12px;" onclick="logout()">Đăng xuất</button>
    </div>

    <!-- DANH SÁCH VĐV -->
    <div class="card">
      <h2>📋 Danh sách vận động viên</h2>
      <div id="countBadge" class="badge hidden">0 VĐV</div>
      <textarea id="playersList" placeholder="Nhấn nút tải để lấy danh sách..."></textarea>
      <button class="btn btn-purple" onclick="savePlayers()">💾 Lưu danh sách (A2:A)</button>
    </div>

    <!-- HÀNH ĐỘNG -->
    <div class="card">
      <h2>⚡ Điều khiển</h2>
      <button class="btn btn-orange" onclick="showNewGameModal()" style="margin-bottom:8px;">🚀 Tạo Game Mới (Lưu & Lịch)</button>
      <button class="btn btn-green" onclick="createSchedule()" style="margin-bottom:8px;">📅 Tạo lại lịch thi đấu</button>
      <button class="btn btn-blue" onclick="goScore()" style="margin-bottom:8px;">🏆 Chuyển trang Nhập tỷ số ➡️</button>
    </div>

    <div id="mainStatus" class="status loading hidden"></div>
  </div>

</div>

<!-- MODAL XÁC NHẬN -->
<div id="confirmModal" class="modal-overlay hidden">
  <div class="modal">
    <div style="font-size:30px;">⚠️</div>
    <h3 style="margin-top:10px;">Xác nhận tạo game mới?</h3>
    <p>Hệ thống sẽ ghi đè toàn bộ danh sách vào Sheet và xóa lịch cũ để tạo lịch mới.</p>
    <div class="btn-group">
      <button class="btn btn-red" onclick="closeModal()">Hủy</button>
      <button class="btn btn-green" onclick="executeNewGame()">Đồng ý</button>
    </div>
  </div>
</div>

<script>
// ================= CẤU HÌNH =================
const PASSWORD = "123";
const SCORE_PAGE_URL = "https://ductrong49.github.io/ritapickleball/tyso.html";
// ⚠️ QUAN TRỌNG: Thay URL này bằng URL Web App MỚI sau khi bạn Deploy lại Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbxwipJQZflKdsa04oxrW9cuySSRm22i3TjX2Q4by5qaHpzEkzUZiy9TKIVA7W9jEG5urA/exec";

// ================= XỬ LÝ LOGIC =================

function login() {
  const p = document.getElementById('passInput').value;
  const msg = document.getElementById('loginMsg');
  if (p === PASSWORD) {
    document.getElementById('screenLogin').classList.add('hidden');
    document.getElementById('screenMain').classList.remove('hidden');
    loadData();
  } else {
    msg.textContent = "❌ Sai mật khẩu!";
    msg.classList.remove('hidden');
  }
}

function logout() { location.reload(); }

function showStatus(elId, msg, type) {
  const el = document.getElementById(elId);
  el.innerHTML = msg;
  el.className = `status ${type}`;
}

// 🛠️ HÀM GỌI API AN TOÀN (SỬA LỖI UNEXPECTED TOKEN '<')
async function fetchAPI(action, method = "GET", body = null) {
  try {
    const res = await fetch(API_URL, {
      method: method,
      headers: { "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : null
    });
    
    const text = await res.text();
    
    // Kiểm tra xem server có trả về HTML (lỗi) thay vì JSON không
    if (text.trim().startsWith("<")) {
      throw new Error("Lỗi API: Server trả về mã HTML. Vui lòng kiểm tra quyền truy cập 'Anyone' khi Deploy Apps Script.");
    }
    
    return JSON.parse(text);
  } catch (err) {
    throw err;
  }
}

// 🔥 TẢI DỮ LIỆU
async function loadData() {
  showStatus('mainStatus', '<span class="loader"></span> Đang tải danh sách...', 'loading');
  const txtBox = document.getElementById('playersList');
  txtBox.disabled = true;

  try {
    const data = await fetchAPI("getPlayers");
    if (!data.success) throw new Error(data.error);
    
    txtBox.value = data.players.join('\n');
    txtBox.disabled = false;
    
    // Cập nhật số lượng
    const badge = document.getElementById('countBadge');
    badge.textContent = `✅ ${data.players.length} VĐV`;
    badge.classList.remove('hidden');
    
    showStatus('mainStatus', '✅ Tải danh sách thành công!', 'success');
  } catch (err) {
    txtBox.disabled = false;
    showStatus('mainStatus', '❌ ' + err.message, 'error');
  }
}

// 💾 LƯU DỮ LIỆU
async function savePlayers() {
  const text = document.getElementById('playersList').value;
  const list = text.split('\n').map(s => s.trim()).filter(s => s);
  if (list.length === 0) { alert("Danh sách trống!"); return; }

  showStatus('mainStatus', '<span class="loader"></span> Đang lưu...', 'loading');
  try {
    const data = await fetchAPI("savePlayers", "POST", { action: "savePlayers", players: list });
    if (!data.success) throw new Error(data.error);
    showStatus('mainStatus', `✅ ${data.message}`, 'success');
    loadData(); // Reload lại badge
  } catch (err) {
    showStatus('mainStatus', '❌ ' + err.message, 'error');
  }
}

// 📅 TẠO LỊCH
async function createSchedule() {
  showStatus('mainStatus', '<span class="loader"></span> Đang tạo lịch...', 'loading');
  try {
    const data = await fetchAPI("createSchedule", "POST", { action: "createSchedule" });
    if (!data.success) throw new Error(data.error);
    showStatus('mainStatus', `✅ ${data.message}`, 'success');
  } catch (err) {
    showStatus('mainStatus', '❌ ' + err.message, 'error');
  }
}

// 🚀 TẠO GAME MỚI (HỢP NHẤT)
function showNewGameModal() { document.getElementById('confirmModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('confirmModal').classList.add('hidden'); }

async function executeNewGame() {
  closeModal();
  showStatus('mainStatus', '<span class="loader"></span> Bước 1/2: Lưu danh sách...', 'loading');
  
  try {
    const text = document.getElementById('playersList').value;
    const list = text.split('\n').map(s => s.trim()).filter(s => s);

    // 1. Lưu
    const resSave = await fetchAPI("savePlayers", "POST", { action: "savePlayers", players: list });
    if (!resSave.success) throw new Error(resSave.error);

    // 2. Tạo lịch
    showStatus('mainStatus', '<span class="loader"></span> Bước 2/2: Tạo lịch thi đấu...', 'loading');
    const resSched = await fetchAPI("createSchedule", "POST", { action: "createSchedule" });
    if (!resSched.success) throw new Error(resSched.error);

    showStatus('mainStatus', '🎉 HOÀN TẤT! Đã tạo Game mới thành công.', 'success');
    loadData();
  } catch (err) {
    showStatus('mainStatus', '❌ ' + err.message, 'error');
  }
}

function goScore() { window.location.href = SCORE_PAGE_URL; }
</script>

</body>
</html>
