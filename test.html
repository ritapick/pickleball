<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhập Tỷ Số Giải Đấu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 1.8rem;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }
    select, input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    .score-inputs {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .score-inputs input {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }
    .score-inputs span {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .match-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }
    .loading {
      text-align: center;
      color: #666;
      display: none;
    }
    .loading.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ Nhập Tỷ Số Giải Đấu</h1>
    
    <form id="scoreForm">
      <div class="form-group">
        <label for="matchSelect">Chọn trận đấu:</label>
        <select id="matchSelect" required>
          <optgroup label="🏆 Vòng bảng - Bảng A">
            <option value="groupA_match1">Trận 1</option>
            <option value="groupA_match2">Trận 2</option>
            <option value="groupA_match3">Trận 3</option>
            <option value="groupA_match4">Trận 4</option>
            <option value="groupA_match5">Trận 5</option>
            <option value="groupA_match6">Trận 6</option>
          </optgroup>
          <optgroup label="🏆 Vòng bảng - Bảng B">
            <option value="groupB_match1">Trận 1</option>
            <option value="groupB_match2">Trận 2</option>
            <option value="groupB_match3">Trận 3</option>
            <option value="groupB_match4">Trận 4</option>
            <option value="groupB_match5">Trận 5</option>
            <option value="groupB_match6">Trận 6</option>
          </optgroup>
          <optgroup label="🏆 Vòng bảng - Bảng C">
            <option value="groupC_match1">Trận 1</option>
            <option value="groupC_match2">Trận 2</option>
            <option value="groupC_match3">Trận 3</option>
            <option value="groupC_match4">Trận 4</option>
            <option value="groupC_match5">Trận 5</option>
            <option value="groupC_match6">Trận 6</option>
          </optgroup>
          <optgroup label="🏆 Vòng bảng - Bảng D">
            <option value="groupD_match1">Trận 1</option>
            <option value="groupD_match2">Trận 2</option>
            <option value="groupD_match3">Trận 3</option>
            <option value="groupD_match4">Trận 4</option>
            <option value="groupD_match5">Trận 5</option>
            <option value="groupD_match6">Trận 6</option>
          </optgroup>
          <optgroup label="🔥 Vòng Tứ kết">
            <option value="quarter_match1">Tứ kết 1</option>
            <option value="quarter_match2">Tứ kết 2</option>
            <option value="quarter_match3">Tứ kết 3</option>
            <option value="quarter_match4">Tứ kết 4</option>
          </optgroup>
          <optgroup label="⭐ Bán kết">
            <option value="semi_match1">Bán kết 1</option>
            <option value="semi_match2">Bán kết 2</option>
          </optgroup>
          <optgroup label="👑 Chung kết">
            <option value="final">Chung kết</option>
          </optgroup>
        </select>
      </div>
      
      <div class="match-info" id="matchInfo">
        <strong>Thông tin:</strong> <span id="matchDetails">Chọn trận đấu để xem vị trí ô</span>
      </div>
      
      <div class="form-group">
        <label>Tỷ số:</label>
        <div class="score-inputs">
          <input type="number" id="team1Score" min="0" max="99" placeholder="Đội 1" required>
          <span>-</span>
          <input type="number" id="team2Score" min="0" max="99" placeholder="Đội 2" required>
        </div>
      </div>
      
      <button type="submit" id="submitBtn">💾 Lưu tỷ số vào Google Sheets</button>
    </form>
    
    <div class="loading" id="loading">⏳ Đang xử lý...</div>
    <div class="message" id="message"></div>
  </div>

  <script>
    // ⚠️ THAY URL SCRIPT CỦA BẠN VÀO ĐÂY
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6lThMCgk_OeRWvYJEzQNjk6LAIjapOJoBYVoFQOspmxFze44RetiuPDljZi-1jiS8VA/exec';
    
    // Mapping hiển thị thông tin trận đấu
    const MATCH_DETAILS = {
      'groupA_match1': 'Bảng A - Trận 1 → Ô C3 (Đội 1), E3 (Đội 2)',
      'groupA_match2': 'Bảng A - Trận 2 → Ô C4 (Đội 1), E4 (Đội 2)',
      'groupA_match3': 'Bảng A - Trận 3 → Ô C5 (Đội 1), E5 (Đội 2)',
      'groupA_match4': 'Bảng A - Trận 4 → Ô C6 (Đội 1), E6 (Đội 2)',
      'groupA_match5': 'Bảng A - Trận 5 → Ô C7 (Đội 1), E7 (Đội 2)',
      'groupA_match6': 'Bảng A - Trận 6 → Ô C8 (Đội 1), E8 (Đội 2)',
      'groupB_match1': 'Bảng B - Trận 1 → Ô C12 (Đội 1), E12 (Đội 2)',
      'groupB_match2': 'Bảng B - Trận 2 → Ô C13 (Đội 1), E13 (Đội 2)',
      'groupB_match3': 'Bảng B - Trận 3 → Ô C14 (Đội 1), E14 (Đội 2)',
      'groupB_match4': 'Bảng B - Trận 4 → Ô C15 (Đội 1), E15 (Đội 2)',
      'groupB_match5': 'Bảng B - Trận 5 → Ô C16 (Đội 1), E16 (Đội 2)',
      'groupB_match6': 'Bảng B - Trận 6 → Ô C17 (Đội 1), E17 (Đội 2)',
      'groupC_match1': 'Bảng C - Trận 1 → Ô C21 (Đội 1), E21 (Đội 2)',
      'groupC_match2': 'Bảng C - Trận 2 → Ô C22 (Đội 1), E22 (Đội 2)',
      'groupC_match3': 'Bảng C - Trận 3 → Ô C23 (Đội 1), E23 (Đội 2)',
      'groupC_match4': 'Bảng C - Trận 4 → Ô C24 (Đội 1), E24 (Đội 2)',
      'groupC_match5': 'Bảng C - Trận 5 → Ô C25 (Đội 1), E25 (Đội 2)',
      'groupC_match6': 'Bảng C - Trận 6 → Ô C26 (Đội 1), E26 (Đội 2)',
      'groupD_match1': 'Bảng D - Trận 1 → Ô C30 (Đội 1), E30 (Đội 2)',
      'groupD_match2': 'Bảng D - Trận 2 → Ô C31 (Đội 1), E31 (Đội 2)',
      'groupD_match3': 'Bảng D - Trận 3 → Ô C32 (Đội 1), E32 (Đội 2)',
      'groupD_match4': 'Bảng D - Trận 4 → Ô C33 (Đội 1), E33 (Đội 2)',
      'groupD_match5': 'Bảng D - Trận 5 → Ô C34 (Đội 1), E34 (Đội 2)',
      'groupD_match6': 'Bảng D - Trận 6 → Ô C35 (Đội 1), E35 (Đội 2)',
      'quarter_match1': 'Tứ kết 1 → Ô D3 (Đội 1), F3 (Đội 2)',
      'quarter_match2': 'Tứ kết 2 → Ô D6 (Đội 1), F6 (Đội 2)',
      'quarter_match3': 'Tứ kết 3 → Ô D9 (Đội 1), F9 (Đội 2)',
      'quarter_match4': 'Tứ kết 4 → Ô D12 (Đội 1), F12 (Đội 2)',
      'semi_match1': 'Bán kết 1 → Ô C4 (Đội 1), E4 (Đội 2)',
      'semi_match2': 'Bán kết 2 → Ô C7 (Đội 1), E7 (Đội 2)',
      'final': 'Chung kết → Ô B4 (Đội 1), D4 (Đội 2)'
    };
    
    const form = document.getElementById('scoreForm');
    const matchSelect = document.getElementById('matchSelect');
    const matchDetails = document.getElementById('matchDetails');
    const message = document.getElementById('message');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');
    
    // Cập nhật thông tin khi chọn trận
    matchSelect.addEventListener('change', function() {
      matchDetails.textContent = MATCH_DETAILS[this.value] || 'Chọn trận đấu';
      hideMessage();
    });
    
    // Xử lý submit form
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const matchId = matchSelect.value;
      const team1Score = document.getElementById('team1Score').value;
      const team2Score = document.getElementById('team2Score').value;
      
      // Hiển thị loading
      loading.classList.add('show');
      submitBtn.disabled = true;
      hideMessage();
      
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // Quan trọng: Google Apps Script yêu cầu no-cors
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ matchId, team1Score, team2Score })
        });
        
        // Do no-cors, response không đọc được, nên giả định thành công
        showMessage('✅ Đã gửi yêu cầu lưu tỷ số! Kiểm tra Google Sheets để xác nhận.', 'success');
        form.reset();
        
      } catch (error) {
        showMessage('❌ Lỗi kết nối: ' + error.message, 'error');
      } finally {
        loading.classList.remove('show');
        submitBtn.disabled = false;
      }
    });
    
    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
      message.style.display = 'block';
    }
    
    function hideMessage() {
      message.style.display = 'none';
    }
    
    // Khởi tạo
    matchSelect.dispatchEvent(new Event('change'));
  </script>
</body>
</html>
