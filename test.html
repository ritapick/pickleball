<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Robin Round</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>🔐 Đăng nhập</h2>
    <input type="password" id="pass" placeholder="Nhập mật khẩu">
    <button onclick="login()">Đăng nhập</button>
  </div>

  <!-- MAIN -->
  <div id="mainBox" class="hidden">
    <h2>🏓 Quản lý giải Pickleball</h2>

    <textarea id="players" rows="8" placeholder="Nhập danh sách VĐV (mỗi dòng 1 người)"></textarea>

    <button onclick="savePlayers()">💾 Lưu danh sách</button>

    <button onclick="createSchedule()">🔥 Tạo lịch thi đấu</button>

    <p id="status"></p>
  </div>

</div>

<script>
const PASSWORD = "123";

// 🔗 Apps Script của bạn
const API_URL = "https://script.google.com/macros/s/AKfycby13pq30wM3eb3RktdlZE_1CVNKsFkFN97UCYDzWUcqEaP2TN5cF6z4YnUfm0iA4SDT8g/exec";

// ===== LOGIN =====
function login() {
  let pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainBox").classList.remove("hidden");
  } else {
    alert("Sai mật khẩu!");
  }
}

// ===== LƯU DANH SÁCH =====
function savePlayers() {
  let text = document.getElementById("players").value.trim();

  if (!text) {
    alert("Nhập danh sách VĐV!");
    return;
  }

  let players = text.split("\n").map(x => x.trim()).filter(x => x);

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "savePlayers",
      players: players
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText = "✅ Đã lưu danh sách!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Lỗi lưu!";
  });
}

// ===== TẠO LỊCH =====
function createSchedule() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createSchedule"
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText = "🔥 Đã tạo lịch!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Lỗi tạo lịch!";
  });
}
</script>

</body>
</html>
