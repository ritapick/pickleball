<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pickleball Manager Pro</title>
<link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.0/index.css" rel="stylesheet">

<style>
/* ===== GIỮ NGUYÊN CSS CỦA BẠN ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);
  color:#e2e8f0;min-height:100vh;overflow-x:hidden;
}
/* (rút gọn vì giữ nguyên toàn bộ như bạn gửi) */
.hidden{display:none!important}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
  <input type="password" id="pass" placeholder="Nhập mật khẩu" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Đăng nhập</button>
</div>

<!-- MAIN -->
<div id="mainBox" class="hidden">
  <h2>Pickleball Manager</h2>

  <textarea id="players" rows="6"></textarea>

  <div id="playerTags"></div>

  <button id="newGameBtn" class="hidden" onclick="createGame()">Tạo game</button>

  <div id="status"></div>
</div>

</div>

<script>
(function(){

const PASSWORD = "123";
const API_URL = "https://script.google.com/macros/s/AKfycbxyjSKqBHxBoIuMIrmx8niKyYPVeAkMFVA3czmi5Zm5DG_LY_7MzkQhXF2TghhF0Dpu3Q/exec";

let originalPlayers = [];

/* ================= API ================= */
function callAPI(action, data){

  const payload = { action, ...data };

  return fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(payload)
  })
  .then(res => res.text())
  .then(text=>{
    try{
      return JSON.parse(text);
    }catch(e){
      console.error("RAW RESPONSE:", text);
      throw new Error("Response không phải JSON");
    }
  });

}

/* ================= UI ================= */

function showStatus(msg){
  document.getElementById("status").innerText = msg;
}

/* ================= LOGIN ================= */

function setLogged(){
  localStorage.setItem("pb_ok","1");
}

function isLogged(){
  return localStorage.getItem("pb_ok")==="1";
}

window.doLogin = function(){
  const pass = document.getElementById("pass").value;

  if(pass === PASSWORD){
    setLogged();

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainBox").classList.remove("hidden");

    loadPlayers(); // 🔥 AUTO LOAD SAU LOGIN
  }else{
    alert("Sai mật khẩu");
  }
};

/* ================= LOAD DATA ================= */

function loadPlayers(){

  showStatus("Đang tải danh sách...");

  callAPI("loadPlayers")
  .then(data=>{

    if(data.players && data.players.length){

      originalPlayers = data.players;

      document.getElementById("players").value = data.players.join("\n");

      updateTags();

      showStatus("Đã load " + data.players.length + " VĐV");

    }else{
      showStatus("Chưa có dữ liệu");
    }

  })
  .catch(err=>{
    console.error(err);
    showStatus("Lỗi kết nối API");
  });

}

/* ================= TAG ================= */

function updateTags(){

  const text = document.getElementById("players").value.trim();

  const list = text
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  const box = document.getElementById("playerTags");
  box.innerHTML = "";

  list.forEach(p=>{
    const div = document.createElement("div");
    div.innerText = p;
    box.appendChild(div);
  });

}

/* ================= CREATE GAME ================= */

window.createGame = function(){

  const text = document.getElementById("players").value.trim();

  if(!text){
    alert("Nhập danh sách");
    return;
  }

  const list = text.split("\n").map(x=>x.trim()).filter(x=>x);

  showStatus("Đang tạo game...");

  callAPI("savePlayers",{players:list})
  .then(()=>callAPI("createSchedule"))
  .then(()=>{
    showStatus("Tạo game thành công");
    originalPlayers = list;
  })
  .catch(()=>{
    showStatus("Lỗi tạo game");
  });

};

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded",function(){

  document.getElementById("players").addEventListener("input",updateTags);

  // 🔥 AUTO LOGIN nếu đã lưu
  if(isLogged()){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainBox").classList.remove("hidden");

    loadPlayers(); // 🔥 LOAD NGAY
  }

});

})();
</script>

</body>
</html>
