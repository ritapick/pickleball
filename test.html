<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 KẾT QUẢ PICKLEBALL</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-glow: rgba(255,107,53,0.4);
            --secondary: #00b4d8;
            --accent: #ffd166;
            --bg-dark: #0b0f19;
            --bg-card: #141a2b;
            --bg-card-hover: #1c2438;
            --border: rgba(255,255,255,0.06);
            --text: #e8ecf4;
            --text-dim: #7a8ba5;
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.3);
            --red: #ef4444;
            --purple: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 12px;
            padding-bottom: 30px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 15% 20%, rgba(255,107,53,0.08) 0%, transparent 45%), radial-gradient(ellipse at 85% 80%, rgba(0,180,216,0.06) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        .wrapper { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 16px 4px 14px; }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000; font-family: 'Oswald', sans-serif; font-weight: 700;
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
            padding: 4px 14px; border-radius: 20px; margin-bottom: 10px;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        header h1 {
            font-family: 'Oswald', sans-serif; font-size: clamp(1.5rem, 7vw, 2.2rem);
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            background: linear-gradient(135deg, #fff 20%, var(--accent), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.3;
        }
        header p { color: var(--text-dim); margin-top: 4px; font-size: 0.75rem; }
        .divider { width: 40px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); margin: 10px auto 0; border-radius: 2px; }
        .section { margin-bottom: 24px; }
        .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .section-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
        .icon-group { background: linear-gradient(135deg, var(--primary), #ff9248); }
        .icon-qf { background: linear-gradient(135deg, var(--secondary), #0096c7); }
        .icon-sf { background: linear-gradient(135deg, var(--purple), #7c3aed); }
        .icon-final { background: linear-gradient(135deg, #ffd700, #ff9248); }
        .section-head h2 { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .section-head h2 span { color: var(--accent); }
        .rank-wrap {
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .rank-table { width: 100%; border-collapse: collapse; min-width: 280px; font-size: 0.8rem; }
        .rank-table thead th {
            background: rgba(255,107,53,0.1); padding: 9px 6px; font-family: 'Oswald', sans-serif;
            font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.6px;
            text-align: center; color: var(--accent); border-bottom: 2px solid var(--primary);
            white-space: nowrap; position: sticky; top: 0;
        }
        .rank-table tbody tr { border-bottom: 1px solid var(--border); }
        .rank-table tbody tr:last-child { border-bottom: none; }
        .rank-table td { padding: 8px 6px; text-align: center; }
        .rank-table td:first-child { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.85rem; }
        .rank-table td:nth-child(2) { text-align: center; font-weight: 500; }
        .rank-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; }
        .r1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 0 6px rgba(255,215,0,0.3); }
        .r2 { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); color: #000; }
        .r3 { background: linear-gradient(135deg, #cd7f32, #a05a18); color: #fff; }
        .r0 { background: var(--bg-card-hover); color: var(--text-dim); }
        .group-title {
            font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600;
            color: var(--accent); margin-bottom: 8px; padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }
        .match-grid { display: grid; gap: 10px; }
        .match-card {
            background: var(--bg-card); border-radius: 14px; border: 1.5px solid var(--border);
            overflow: hidden; transition: all 0.25s ease; animation: fadeUp 0.4s ease forwards; opacity: 0;
        }
        .match-card.saved { border-color: rgba(34,197,94,0.45); box-shadow: 0 0 16px rgba(34,197,94,0.1); }
        .match-card.syncing { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 16px rgba(139,92,246,0.15); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .mc-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.015); border-bottom: 1px solid var(--border); }
        .mc-round { font-family: 'Oswald', sans-serif; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); background: var(--bg-card-hover); padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border); }
        .mc-status { font-size: 0.58rem; font-weight: 600; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
        .mc-status.saved-badge { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
        .mc-status.pending-badge { background: rgba(255,209,102,0.1); color: var(--accent); border: 1px solid rgba(255,209,102,0.15); }
        .mc-body { padding: 14px 12px 10px; }
        .mc-teams { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .mc-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center; }
        .mc-team-label { font-size: 0.55rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .mc-team-names { font-weight: 600; font-size: 0.76rem; line-height: 1.35; }
        .mc-team-names .amp { display: block; color: var(--text-dim); font-weight: 400; font-size: 0.6rem; }
        .mc-vs { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; min-width: 96px; }
        .vs-circle { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.6rem; color: #000; }
        .mc-score-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .mc-score-row input[type="number"] {
            width: 44px; height: 36px; text-align: center; font-family: 'Oswald', sans-serif;
            font-size: 1.2rem; font-weight: 700; border-radius: 8px; border: 1.5px solid var(--border);
            background: var(--bg-card-hover); color: var(--text); outline: none; transition: all 0.2s;
            -moz-appearance: textfield;
        }
        .mc-score-row input[type="number"]::-webkit-outer-spin-button,
        .mc-score-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .mc-score-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.15); }
        .mc-score-row input.saved-input { border-color: var(--green); background: rgba(34,197,94,0.08); color: var(--green); }
        .mc-score-row input.error-input { border-color: var(--red); background: rgba(239,68,68,0.08); }
        .mc-score-row .dash { color: var(--text-dim); font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; }
        .mc-save-area { padding: 8px 12px 12px; display: flex; justify-content: center; }
        .mc-save-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; max-width: 260px; padding: 10px 20px; font-family: 'Oswald', sans-serif;
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
            color: #000; background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 12px var(--primary-glow);
        }
        .mc-save-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(255,107,53,0.4); }
        .mc-save-btn:active { transform: translateY(0) scale(0.98); }
        .mc-save-btn.btn-saved { background: linear-gradient(90deg, var(--green), #10b981); box-shadow: 0 3px 12px var(--green-glow); color: #fff; }
        .mc-save-btn.btn-syncing { background: linear-gradient(90deg, var(--purple), #7c3aed); box-shadow: 0 3px 12px rgba(139,92,246,0.3); color: #fff; pointer-events: none; }
        .mc-save-btn .btn-icon { font-size: 1.05rem; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
        .mc-save-btn.pulse { animation: pulse 1.5s ease 1; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .mc-save-btn.shake { animation: shake 0.4s ease; }
        @keyframes spinSlow { to { transform: rotate(360deg); } }
        .spinner-sm { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spinSlow 0.6s linear infinite; }
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px);
            z-index: 200; padding: 11px 22px; border-radius: 12px; font-family: 'Oswald', sans-serif;
            font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 28px rgba(0,0,0,0.3); max-width: 88vw; text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: linear-gradient(135deg, rgba(34,197,94,0.92), rgba(16,185,129,0.92)); color: #fff; }
        .toast.error { background: linear-gradient(135deg, rgba(239,68,68,0.92), rgba(220,38,38,0.92)); color: #fff; }
        .toast.warning { background: linear-gradient(135deg, rgba(255,209,102,0.95), rgba(245,158,11,0.95)); color: #000; }
        .toast.info { background: linear-gradient(135deg, rgba(139,92,246,0.92), rgba(124,58,237,0.92)); color: #fff; }
        .loader { display: flex; flex-direction: column; align-items: center; padding: 28px 12px; gap: 12px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spinSlow 0.7s linear infinite; }
        .loader-text { color: var(--text-dim); font-size: 0.78rem; }
        .err-box { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 16px 14px; text-align: center; }
        .err-box h3 { color: var(--red); margin-bottom: 4px; font-size: 0.85rem; }
        .err-box p { color: var(--text-dim); font-size: 0.75rem; }
        .group-wrap { margin-bottom: 16px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .tab-btn {
            padding: 6px 14px; font-family: 'Oswald', sans-serif; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-dim); cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: linear-gradient(90deg, var(--primary), var(--accent)); color: #000; border-color: transparent; box-shadow: 0 2px 8px var(--primary-glow); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 2px; }
        @media (max-width: 380px) {
            .mc-team-names { font-size: 0.7rem; }
            .mc-score-row input[type="number"] { width: 40px; height: 33px; font-size: 1.1rem; }
            .mc-vs { min-width: 84px; }
            .mc-save-btn { padding: 9px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="badge">🏓 PICKLEBALL TOURNAMENT</div>
        <h1>GIẢI ĐẤU PICKLEBALL</h1>
        <p>KẾT QUẢ & BẢNG XẾP HẠNG</p>
        <div class="divider"></div>
    </header>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-group">📋</div>
            <h2><span>VÒNG BẢNG</span></h2>
        </div>
        <div id="group-tabs" class="tabs"></div>
        <div id="group-areas"></div>
    </section>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-qf">🏅</div>
            <h2><span>VÒNG TỨ KẾT</span></h2>
        </div>
        <div id="qf-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-sf">⚡</div>
            <h2><span>BÁN KẾT</span></h2>
        </div>
        <div id="sf-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-final">🏆</div>
            <h2><span>CHUNG KẾT</span></h2>
        </div>
        <div id="final-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== CẤU HÌNH ====================
    const SHEET_ID = '1jcCx9TFq80uFW0tSQJDL1kmTRrYierOARbvevhbxuXg';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7i3JdZGttrO-H4_6E1gI_QMFFQCxJ3I3i6bMnk-rJxq9uxpiTgAdcbnao18pLxK7UGg/exec';
    const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

    let allMatchData = [];
    let serverScores = {};

    // ==================== HÀM HỖ TRỢ ====================
    function getSheet(sheetName, range) {
        const url = `${BASE}?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
        return fetch(url).then(r => {
            if (!r.ok) throw new Error('Không kết nối được Google Sheets.');
            return r.text();
        }).then(txt => {
            const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?$/);
            if (!m) throw new Error('Parse dữ liệu thất bại');
            return JSON.parse(m[1]);
        });
    }

    function val(row, ci) {
        if (!row || !row.c || !row.c[ci] || row.c[ci].v == null) return '';
        return String(row.c[ci].v);
    }

    // ==================== RENDER GROUP RANKINGS ====================
    function renderGroupRanking(groupName, data) {
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) return '';
        const hdrs = t.cols.map(c => c.label || '');
        let h = `<div class="group-title">Bảng ${groupName.toUpperCase()}</div>`;
        h += '<div class="rank-wrap"><table class="rank-table"><thead><tr><th>#</th>';
        hdrs.forEach(x => { h += `<th>${x}</th>`; });
        h += '</tr></thead><tbody>';

        t.rows.forEach((row, i) => {
            const has = row.c && row.c.some(c => c && c.v !== '' && c.v !== null);
            if (!has) return;
            const rc = i < 3 ? `r${i+1}` : 'r0';
            h += `<tr><td><span class="rank-num ${rc}">${i+1}</span></td>`;
            for (let j = 0; j < hdrs.length; j++) {
                h += `<td>${val(row, j)}</td>`;
            }
            h += '</tr>';
        });
        h += '</tbody></table></div>';
        return h;
    }

    // ==================== RENDER MATCHES ====================
    function renderMatchCard(match, index) {
        const existingS1 = match.existingS1 || '';
        const existingS2 = match.existingS2 || '';
        const isSaved = (existingS1 !== '' && existingS2 !== '');
        const cardCls = isSaved ? 'saved' : '';
        const delay = Math.min(index * 0.04, 1.5);
        const inputCls = isSaved ? 'saved-input' : '';
        const badgeCls = isSaved ? 'mc-status saved-badge' : 'mc-status pending-badge';
        const badgeTxt = isSaved ? 'Đã thi đấu ✓' : 'Chưa thi đấu';
        const btnCls = isSaved ? 'mc-save-btn btn-saved' : 'mc-save-btn';
        const btnIcon = isSaved ? '✓' : '💾';
        const btnTxt = isSaved ? 'Đã lưu' : 'Lưu tỷ số';

        let h = `<div class="match-card ${cardCls}" style="animation-delay:${delay}s" id="${match.id}">`;
        h += `<div class="mc-head"><span class="mc-round">${match.round || 'Trận ' + (index + 1)}</span><span class="${badgeCls}" id="status-${match.id}">${badgeTxt}</span></div>`;
        h += `<div class="mc-body"><div class="mc-teams">`;
        h += `<div class="mc-team"><span class="mc-team-label">Đội 1</span><div class="mc-team-names">${match.t1 || 'Đội 1'}</div></div>`;
        h += `<div class="mc-vs"><div class="vs-circle">VS</div><div class="mc-score-row">`;
        h += `<input type="number" class="${inputCls}" id="s1-${match.id}" placeholder="-" min="0" inputmode="numeric">`;
        h += `<span class="dash">-</span>`;
        h += `<input type="number" class="${inputCls}" id="s2-${match.id}" placeholder="-" min="0" inputmode="numeric">`;
        h += `</div></div>`;
        h += `<div class="mc-team"><span class="mc-team-label">Đội 2</span><div class="mc-team-names">${match.t2 || 'Đội 2'}</div></div>`;
        h += `</div></div>`;
        h += `<div class="mc-save-area"><button class="${btnCls}" id="sbtn-${match.id}" onclick="saveSingleScore('${match.id}')">`;
        h += `<span class="btn-icon">${btnIcon}</span><span>${btnTxt}</span></button></div></div>`;

        return h;
    }

    function renderGroupMatches(groupName, matches, startIndex) {
        if (matches.length === 0) return '';
        let h = `<div class="group-title">Bảng ${groupName.toUpperCase()} - Các trận đấu</div><div class="match-grid">`;
        matches.forEach((m, i) => { h += renderMatchCard(m, startIndex + i); });
        h += '</div>';
        return h;
    }

    // ==================== LOAD GROUP DATA ====================
    async function loadGroupData() {
        const groups = ['a', 'b', 'c', 'd'];
        const groupRanges = {
            'a': { ranking: 'B3:F8', matches: 'B3:F8', startRow: 3 },
            'b': { ranking: 'B12:F17', matches: 'B12:F17', startRow: 12 },
            'c': { ranking: 'B21:F26', matches: 'B21:F26', startRow: 21 },
            'd': { ranking: 'B30:F35', matches: 'B30:F35', startRow: 30 }
        };

        const promises = groups.map(g => getSheet('bang', groupRanges[g].ranking));
        const results = await Promise.all(promises);

        const tabsEl = document.getElementById('group-tabs');
        const areasEl = document.getElementById('group-areas');
        let tabsHtml = '<button class="tab-btn active" onclick="switchTab(\'all\')">Tất cả</button>';
        let areasHtml = '';
        let matchIndex = 0;

        groups.forEach((g, idx) => {
            const data = results[idx];
            const t = data.table;
            if (!t || !t.rows || t.rows.length === 0) return;

            const matches = [];
            t.rows.forEach((row, rowIdx) => {
                const t1Name = val(row, 0);
                const t2Name = val(row, 4);
                const score1 = val(row, 1);
                const score2 = val(row, 3);
                const actualRow = groupRanges[g].startRow + rowIdx;
                const matchId = `group_${g}_${rowIdx}`;

                matches.push({
                    id: matchId,
                    round: `Trận ${rowIdx + 1}`,
                    t1: t1Name,
                    t2: t2Name,
                    existingS1: score1,
                    existingS2: score2,
                    sheetName: 'bang',
                    team1Col: 'C',
                    team2Col: 'E',
                    row: actualRow
                });
                allMatchData.push({
                    id: matchId,
                    sheetName: 'bang',
                    team1Col: 'C',
                    team2Col: 'E',
                    row: actualRow
                });
                matchIndex++;
            });

            const rankingHtml = renderGroupRanking(g, data);
            const matchesHtml = renderGroupMatches(g, matches, matchIndex - matches.length);

            tabsHtml += `<button class="tab-btn" onclick="switchTab('${g}')">Bảng ${g.toUpperCase()}</button>`;
            areasHtml += `<div class="tab-content ${idx === 0 ? 'active' : ''}" id="tab-${g}">${rankingHtml}${matchesHtml}</div>`;
        });

        tabsEl.innerHTML = tabsHtml;
        areasEl.innerHTML = areasHtml;

        // Fill existing scores
        allMatchData.forEach(m => {
            if (m.existingS1 || m.existingS2) {
                const el1 = document.getElementById(`s1-${m.id}`);
                const el2 = document.getElementById(`s2-${m.id}`);
                if (el1 && m.existingS1) el1.value = m.existingS1;
                if (el2 && m.existingS2) el2.value = m.existingS2;
            }
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        if (tab === 'all') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('active'));
        } else {
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
    }

        // ==================== LOAD QUARTER FINALS (Đã chỉnh theo hình) ====================
    async function loadQFData() {
        // Query vùng A2:G12 trả về đúng 11 dòng (index 0 -> 10)
        const data = await getSheet('1.8', 'A2:G12');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            document.getElementById('qf-area').innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3><p>Kiểm tra sheet "1.8"</p></div>';
            return;
        }

        // 📍 MAPPING CHÍNH XÁC THEO HÌNH:
        // Dòng 3  -> t.rows[1]  | Team 1: Cột C (index 2) | Team 2: Cột G (index 6)
        // Dòng 6  -> t.rows[4]  | Team 1: Cột C (index 2) | Team 2: Cột G (index 6)
        // Dòng 9  -> t.rows[7]  | Team 1: Cột C (index 2) | Team 2: Cột G (index 6)
        // Dòng 12 -> t.rows[10] | Team 1: Cột C (index 2) | Team 2: Cột G (index 6)
        
        const matchConfig = [
            { sheetRow: 3,  rowIdx: 1,  round: 'Tứ kết 1' },
            { sheetRow: 6,  rowIdx: 4,  round: 'Tứ kết 2' },
            { sheetRow: 9,  rowIdx: 7,  round: 'Tứ kết 3' },
            { sheetRow: 12, rowIdx: 10, round: 'Tứ kết 4' }
        ];

        let h = '<div class="match-grid">';
        matchConfig.forEach((cfg, i) => {
            const row = t.rows[cfg.rowIdx];
            
            // Lấy dữ liệu theo đúng cột trong hình
            const t1Name = val(row, 2); // Cột C
            const t2Name = val(row, 6); // Cột G
            const existingS1 = val(row, 3); // Cột D (tỷ số đội 1)
            const existingS2 = val(row, 5); // Cột F (tỷ số đội 2)

            const matchId = `qf_${cfg.sheetRow}`;
            const matchObj = {
                id: matchId,
                round: cfg.round,
                t1: t1Name || `Đội 1 Trận ${i+1}`,
                t2: t2Name || `Đội 2 Trận ${i+1}`,
                existingS1: existingS1,
                existingS2: existingS2,
                sheetName: '1.8',
                team1Col: 'D', // Nơi ghi tỷ số đội 1
                team2Col: 'F', // Nơi ghi tỷ số đội 2
                row: cfg.sheetRow
            };
            
            allMatchData.push(matchObj);
            h += renderMatchCard(matchObj, i);
        });
        h += '</div>';
        document.getElementById('qf-area').innerHTML = h;

        // Điền lại tỷ số đã có vào ô input
        matchConfig.forEach(cfg => {
            const row = t.rows[cfg.rowIdx];
            const matchId = `qf_${cfg.sheetRow}`;
            const el1 = document.getElementById(`s1-${matchId}`);
            const el2 = document.getElementById(`s2-${matchId}`);
            if (el1) el1.value = val(row, 3) || '';
            if (el2) el2.value = val(row, 5) || '';
        });
    }

    // ==================== LOAD SEMI FINALS ====================
    async function loadSFData() {
        const data = await getSheet('bk', 'A3:F7');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            document.getElementById('sf-area').innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3><p>Kiểm tra sheet "bk"</p></div>';
            return;
        }

        const matches = [
            { scoreRow: 4, round: 'Bán kết 1', t1: val(t.rows[0], 0), t2: val(t.rows[0], 1) },
            { scoreRow: 7, round: 'Bán kết 2', t1: val(t.rows[1], 0), t2: val(t.rows[1], 1) }
        ];

        let h = '<div class="match-grid">';
        matches.forEach((m, i) => {
            const matchId = `sf_${m.scoreRow}`;
            const match = {
                id: matchId,
                round: m.round,
                t1: m.t1,
                t2: m.t2,
                existingS1: '',
                existingS2: '',
                sheetName: 'bk',
                team1Col: 'C',
                team2Col: 'E',
                row: m.scoreRow
            };
            allMatchData.push(match);
            h += renderMatchCard(match, i);
        });
        h += '</div>';
        document.getElementById('sf-area').innerHTML = h;
    }

    // ==================== LOAD FINAL ====================
    async function loadFinalData() {
        const data = await getSheet('ck', 'A3:E4');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            document.getElementById('final-area').innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3><p>Kiểm tra sheet "ck"</p></div>';
            return;
        }

        const matchId = 'final_4';
        const match = {
            id: matchId,
            round: 'Chung kết',
            t1: val(t.rows[0], 0),
            t2: val(t.rows[0], 1),
            existingS1: '',
            existingS2: '',
            sheetName: 'ck',
            team1Col: 'B',
            team2Col: 'D',
            row: 4
        };
        allMatchData.push(match);

        document.getElementById('final-area').innerHTML = `<div class="match-grid">${renderMatchCard(match, 0)}</div>`;
    }

    // ==================== SAVE SCORE ====================
    async function saveSingleScore(matchId) {
        const el1 = document.getElementById(`s1-${matchId}`);
        const el2 = document.getElementById(`s2-${matchId}`);
        const statusEl = document.getElementById(`status-${matchId}`);
        const cardEl = document.getElementById(matchId);
        const sbtn = document.getElementById(`sbtn-${matchId}`);

        if (!el1 || !el2 || !sbtn) return;

        const v1 = el1.value.trim();
        const v2 = el2.value.trim();

        el1.classList.remove('saved-input', 'error-input');
        el2.classList.remove('saved-input', 'error-input');
        sbtn.classList.remove('shake');

        if (v1 === '' && v2 === '') {
            showToast('⚠️ Vui lòng nhập tỷ số', 'warning');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }
        if (v1 === '' || v2 === '') {
            showToast('⚠️ Vui lòng nhập đủ 2 tỷ số', 'warning');
            if (v1 === '') el1.classList.add('error-input');
            if (v2 === '') el2.classList.add('error-input');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }
        const n1 = parseInt(v1);
        const n2 = parseInt(v2);
        if (isNaN(n1) || isNaN(n2) || n1 < 0 || n2 < 0) {
            el1.classList.add('error-input');
            el2.classList.add('error-input');
            showToast('⚠️ Tỷ số phải là số không âm', 'warning');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }

        const match = allMatchData.find(m => m.id === matchId);
        if (!match) {
            showToast('⚠️ Không tìm thấy thông tin trận', 'warning');
            return;
        }

        const originalBtnHtml = sbtn.innerHTML;
        sbtn.className = 'mc-save-btn btn-syncing';
        sbtn.innerHTML = '<div class="spinner-sm"></div><span>Đang lưu...</span>';
        cardEl.classList.add('syncing');
        sbtn.disabled = true;

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    action: 'saveScore',
                    sheetName: match.sheetName,
                    team1Col: match.team1Col,
                    team2Col: match.team2Col,
                    row: match.row,
                    score1: n1,
                    score2: n2
                })
            });

            el1.classList.add('saved-input');
            el2.classList.add('saved-input');
            cardEl.classList.remove('syncing');
            cardEl.classList.add('saved');
            if (statusEl) {
                statusEl.className = 'mc-status saved-badge';
                statusEl.textContent = 'Đã lưu ✓';
            }
            sbtn.className = 'mc-save-btn btn-saved pulse';
            sbtn.innerHTML = '<span class="btn-icon">✓</span><span>Đã lưu</span>';
            setTimeout(() => { if (sbtn) sbtn.classList.remove('pulse'); }, 1500);

            showToast(`✅ Đã lưu tỷ số ${n1} - ${n2}`, 'success');
        } catch(e) {
            console.error('Save error:', e);
            cardEl.classList.remove('syncing');
            sbtn.className = 'mc-save-btn';
            sbtn.innerHTML = originalBtnHtml;
            sbtn.disabled = false;
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            showToast('❌ Lỗi kết nối. Kiểm tra Apps Script URL.', 'error');
        }
    }

    // ==================== TOAST ====================
    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => { toast.classList.remove('show'); }, 2800);
    }

    // ==================== INIT ====================
    async function init() {
        try {
            await Promise.all([
                loadGroupData(),
                loadQFData(),
                loadSFData(),
                loadFinalData()
            ]);
        } catch (e) {
            console.error(e);
            const errMsg = `<div class="err-box"><h3>⚠️ Lỗi tải dữ liệu</h3><p>${e.message}</p><p style="margin-top:6px;font-size:0.72rem;">✅ Kiểm tra:<br>1. Sheet chia sẻ "Bất kỳ ai có link"<br>2. Tên sheet đúng: bang, 1.8, bk, ck<br>3. Kết nối internet</p></div>`;
            ['group-areas', 'qf-area', 'sf-area', 'final-area'].forEach(id => {
                const el = document.getElementById(id);
                if (el && !el.innerHTML.trim()) el.innerHTML = errMsg;
            });
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

function doPost(e) {

      return saveScore(data);
    }

function saveScore(data) {
  var sheetName = data.sheetName;
  var team1Col = data.team1Col;  // 'B', 'C', 'D', etc.
  var team2Col = data.team2Col;  // 'B', 'C', 'D', etc.
  var row = data.row;
  var score1 = data.score1;
  var score2 = data.score2;
  
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName(sheetName);
  
  if (!sheet) {
    return ContentService.createTextOutput(JSON.stringify({status: 'error', message: 'Sheet not found: ' + sheetName}));
  }
  
  // Convert column letter to number (A=1, B=2, etc.)
  var col1 = team1Col.toUpperCase().charCodeAt(0) - 64;
  var col2 = team2Col.toUpperCase().charCodeAt(0) - 64;
  
  // Set scores
  sheet.getRange(row, col1).setValue(score1);
  sheet.getRange(row, col2).setValue(score2);
  
  return ContentService.createTextOutput(JSON.stringify({status: 'success', message: 'Score saved'}));
}
