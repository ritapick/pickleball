<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhập Điểm Giải Đấu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--input:#334155;--border:#475569;--text:#f1f5f9;--muted:#94a3b8;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--orange:#f97316;--red:#ef4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
    .header{background:linear-gradient(135deg,#1e293b,#334155);padding:20px 24px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .header h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .status{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
    .status.ok{background:rgba(34,197,94,.2);color:#86efac;border:1px solid rgba(34,197,94,.4)}
    .status.err{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
    .container{max-width:1300px;margin:0 auto;padding:20px}
    .tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--card);padding:6px;border-radius:12px;overflow-x:auto}
    .tab{padding:10px 18px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;white-space:nowrap}
    .tab.active{background:var(--input);color:var(--text)}
    .content{display:none}.content.active{display:block}
    .round-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border)}
    .round-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .vb .round-icon{background:linear-gradient(135deg,#22c55e,#16a34a)}.tk .round-icon{background:linear-gradient(135deg,#3b82f6,#2563eb)}
    .bk .round-icon{background:linear-gradient(135deg,#a855f7,#7c3aed)}.ck .round-icon{background:linear-gradient(135deg,#f97316,#ea580c)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .vb .card::before{background:linear-gradient(90deg,#22c55e,#16a34a)}.tk .card::before{background:linear-gradient(90deg,#3b82f6,#2563eb)}
    .bk .card::before{background:linear-gradient(90deg,#a855f7,#7c3aed)}.ck .card::before{background:linear-gradient(90deg,#f97316,#ea580c)}
    .match-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--input);border-radius:8px}
    .lbl{font-size:11px;color:var(--muted);font-weight:600;min-width:18px}
    .team{flex:1;background:transparent;border:1px solid transparent;color:var(--text);padding:7px 9px;border-radius:6px;font-size:13px;min-width:0}
    .team:focus{outline:none;border-color:var(--blue);background:#3b4d63}
    .score{width:52px;background:var(--input);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:6px;font-size:15px;font-weight:700;text-align:center}
    .score:focus{outline:none;border-color:var(--green);background:#1a3a2a}
    .btn{width:100%;margin-top:12px;padding:9px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;transition:all.2s}
    .vb .btn{background:linear-gradient(135deg,#22c55e,#16a34a)}.tk .btn{background:linear-gradient(135deg,#3b82f6,#2563eb)}
    .bk .btn{background:linear-gradient(135deg,#a855f7,#7c3aed)}.ck .btn{background:linear-gradient(135deg,#f97316,#ea580c)}
    .btn:hover{opacity:.9;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
    .btn.saving{opacity:.7;cursor:not-allowed}.btn.saved{background:linear-gradient(135deg,#16a34a,#15803d)!important}
    .btn.err{background:linear-gradient(135deg,#ef4444,#dc2626)!important}
    .fab{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:100}
    .fab-btn{padding:12px 20px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.3);color:#fff}
    .fab-save{background:linear-gradient(135deg,#22c55e,#16a34a)}.fab-load{background:linear-gradient(135deg,#3b82f6,#2563eb)}.fab-test{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
    .fab-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.4)}
    .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:1000;transform:translateX(150%);transition:transform.3s;max-width:380px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .toast.show{transform:translateX(0)}.toast.ok{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
    .toast.err{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}.toast.info{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .group-title{font-size:14px;font-weight:700;margin:16px 0 10px;padding:5px 10px;border-radius:6px;display:inline-block}
    .g-a{background:rgba(34,197,94,.15);color:#86efac}.g-b{background:rgba(59,130,246,.15);color:#93c5fd}
    .g-c{background:rgba(168,85,247,.15);color:#c4b5fd}.g-d{background:rgba(249,115,22,.15);color:#fdba74}
    @media(max-width:768px){.header{padding:14px 16px}.header h1{font-size:20px}.container{padding:14px}.grid{grid-template-columns:1fr}.fab{bottom:14px;right:14px}}
  </style>
</head>
<body>
  <div class="header">
    <h1>🏆 Nhập Điểm Giải Đấu</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="status err" id="status">⚡ Chưa kết nối</span>
      <button class="fab-btn fab-test" onclick="testConnection()" style="padding:8px 14px;font-size:12px;margin:0">🔍 Test</button>
    </div>
  </div>
  
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="tab('vb')">🟢 Vòng Bảng</button>
      <button class="tab" onclick="tab('tk')">🔵 Tứ Kết</button>
      <button class="tab" onclick="tab('bk')">🟣 Bán Kết</button>
      <button class="tab" onclick="tab('ck')">🟠 Chung Kết</button>
    </div>
    
    <div class="content active" id="vb">
      <div class="round-head vb"><div class="round-icon">🟢</div><h2 style="font-size:18px;color:#86efac">VÒNG BẢNG</h2><span style="margin-left:auto;font-size:12px;color:var(--muted)">4 bảng × 6 trận</span></div>
      <div id="vb-container"></div>
    </div>
    
    <div class="content" id="tk">
      <div class="round-head tk"><div class="round-icon">🔵</div><h2 style="font-size:18px;color:#93c5fd">TỨ KẾT</h2><span style="margin-left:auto;font-size:12px;color:var(--muted)">4 trận</span></div>
      <div class="grid" id="tk-container"></div>
    </div>
    
    <div class="content" id="bk">
      <div class="round-head bk"><div class="round-icon">🟣</div><h2 style="font-size:18px;color:#c4b5fd">BÁN KẾT</h2><span style="margin-left:auto;font-size:12px;color:var(--muted)">2 trận</span></div>
      <div class="grid" id="bk-container"></div>
    </div>
    
    <div class="content" id="ck">
      <div class="round-head ck"><div class="round-icon">🟠</div><h2 style="font-size:18px;color:#fdba74">CHUNG KẾT</h2><span style="margin-left:auto;font-size:12px;color:var(--muted)">1 trận</span></div>
      <div class="grid" id="ck-container"></div>
    </div>
  </div>
  
  <div class="fab">
    <button class="fab-btn fab-save" onclick="saveAll()">💾 Lưu Tất Cả</button>
    <button class="fab-btn fab-load" onclick="loadAll()">📥 Tải Dữ Liệu</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkuQa0X_n6II-C9IvD2Y_np2xvjKRoNXUiw4IwnivM_kb23_L69DGV87KyZ7Y-boJufw/exec';
    const GROUPS = ['A','B','C','D'];

    function $(id){return document.getElementById(id)}
    function toast(msg,type='info'){const t=$('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500)}
    function setStatus(ok){$('status').textContent=ok?'🟢 Đã kết nối':'⚡ Lỗi kết nối';$('status').className='status '+(ok?'ok':'err')}
    
    function tab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));event.target.classList.add('active');$(t).classList.add('active')}
    
    function initVB(){const c=$('vb-container');c.innerHTML='';GROUPS.forEach(g=>{let h='<div class="group-title g-'+g.toLowerCase()+'">BẢNG '+g+'</div><div class="grid">';for(let m=0;m<6;m++){const r=m+2,id='vb_'+g+'_'+m;h+='<div class="card vb" id="c-'+id+'"><div class="match-title">Trận '+(m+1)+' • bang:'+r+'</div><div class="row"><span class="lbl">🏠</span><input class="team" id="'+id+'_t1" data-s="bang" data-r="'+r+'" data-c="3" placeholder="Đội nhà"><input class="score" id="'+id+'_s1" data-s="bang" data-r="'+r+'" data-c="4" min="0" placeholder="-"></div><div class="row"><span class="lbl">✈️</span><input class="team" id="'+id+'_t2" data-s="bang" data-r="'+r+'" data-c="5" placeholder="Đội khách"><input class="score" id="'+id+'_s2" data-s="bang" data-r="'+r+'" data-c="6" min="0" placeholder="-"></div><button class="btn" onclick="save(\''+id+'\')">💾 Lưu</button></div>'}c.innerHTML=h+'</div>'})}
    
    function initTK(){const c=$('tk-container'),ms=[{id:'tk_1',t:'Tứ kết 1',sh:'1.8',r:2},{id:'tk_2',t:'Tứ kết 2',sh:'1.8',r:5},{id:'tk_3',t:'Tứ kết 3',sh:'1.8',r:8},{id:'tk_4',t:'Tứ kết 4',sh:'1.8',r:11}];let h='';ms.forEach(m=>{h+='<div class="card tk" id="c-'+m.id+'"><div class="match-title">'+m.t+' • '+m.sh+':'+m.r+'</div><div class="row"><span class="lbl">🏠</span><input class="team" id="'+m.id+'_t1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="4" placeholder="Đội 1"><input class="score" id="'+m.id+'_s1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="5" min="0" placeholder="-"></div><div class="row"><span class="lbl">✈️</span><input class="team" id="'+m.id+'_t2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="6" placeholder="Đội 2"><input class="score" id="'+m.id+'_s2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="7" min="0" placeholder="-"></div><button class="btn" onclick="save(\''+m.id+'\')">💾 Lưu</button></div>'});c.innerHTML=h}
    
    function initBK(){const c=$('bk-container'),ms=[{id:'bk_1',t:'Bán kết 1',sh:'bk',r:3},{id:'bk_2',t:'Bán kết 2',sh:'bk',r:6}];let h='';ms.forEach(m=>{h+='<div class="card bk" id="c-'+m.id+'"><div class="match-title">'+m.t+' • '+m.sh+':'+m.r+'</div><div class="row"><span class="lbl">🏠</span><input class="team" id="'+m.id+'_t1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="3" placeholder="Đội 1"><input class="score" id="'+m.id+'_s1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="4" min="0" placeholder="-"></div><div class="row"><span class="lbl">✈️</span><input class="team" id="'+m.id+'_t2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="5" placeholder="Đội 2"><input class="score" id="'+m.id+'_s2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="6" min="0" placeholder="-"></div><button class="btn" onclick="save(\''+m.id+'\')">💾 Lưu</button></div>'});c.innerHTML=h}
    
    function initCK(){const c=$('ck-container'),m={id:'ck_1',t:'Chung kết',sh:'ck',r:3};c.innerHTML='<div class="card ck" id="c-'+m.id+'"><div class="match-title">'+m.t+' • '+m.sh+':'+m.r+'</div><div class="row"><span class="lbl">🏠</span><input class="team" id="'+m.id+'_t1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="2" placeholder="Đội 1" style="font-weight:700"><input class="score" id="'+m.id+'_s1" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="3" min="0" placeholder="-" style="font-size:18px"></div><div class="row"><span class="lbl">✈️</span><input class="team" id="'+m.id+'_t2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="4" placeholder="Đội 2" style="font-weight:700"><input class="score" id="'+m.id+'_s2" data-s="'+m.sh+'" data-r="'+m.r+'" data-c="5" min="0" placeholder="-" style="font-size:18px"></div><button class="btn" onclick="save(\''+m.id+'\')" style="font-size:14px;padding:10px">💾 Lưu Chung kết</button></div>'}
    
    async function api(path,params={}){const url=SCRIPT_URL+(path?'?'+new URLSearchParams({action:path,...params}):'');try{const res=await fetch(url,{method:params.method||'GET',body:params.body?JSON.stringify(params.body):undefined,headers:params.body?{'Content-Type':'application/json'}:{}});const text=await res.text();try{return JSON.parse(text)}catch(e){console.error('Parse error:',text);throw new Error('Response không phải JSON: '+text.substring(0,100))}}catch(e){console.error('Fetch error:',e);throw e}}
    
    async function testConnection(){toast('Đang kiểm tra kết nối...','info');try{const res=await api('test');if(res.status==='ok'){setStatus(true);toast('✅ '+res.message,'ok')}else{setStatus(false);toast('❌ '+res.message,'err')}}catch(e){setStatus(false);toast('Lỗi kết nối: '+e.message,'err');console.error(e)}}
    
    async function save(id){const btn=$('c-'+id+' .btn');btn.innerHTML='<span class="spinner"></span> Đang lưu...';btn.classList.add('saving');try{const p=id+'_',ref=$(p+'t1'),sheet=ref.dataset.s,row=+ref.dataset.r,ups=[{r:row,c:+ref.dataset.c,v:$(p+'t1').value.trim()},{r:row,c:+$(p+'s1').dataset.c,v:$(p+'s1').value!==''?+$(p+'s1').value:''},{r:row,c:+$(p+'t2').dataset.c,v:$(p+'t2').value.trim()},{r:row,c:+$(p+'s2').dataset.c,v:$(p+'s2').value!==''?+$(p+'s2').value:''}];const res=await api(null,{method:'POST',body:{sheet:sheet,updates:ups}});if(res.status==='success'){btn.innerHTML='✅ Đã lưu';btn.classList.remove('saving');btn.classList.add('saved');toast('Đã lưu '+id.toUpperCase(),'ok');setTimeout(()=>{btn.innerHTML='💾 Lưu';btn.classList.remove('saved')},2000);setStatus(true)}else{throw new Error(res.message)}}catch(e){btn.innerHTML='❌ Lỗi';btn.classList.remove('saving');btn.classList.add('err');toast('Lỗi: '+e.message,'err');setStatus(false);setTimeout(()=>{btn.innerHTML='💾 Lưu';btn.classList.remove('err')},3000)}}
    
    async function saveAll(){toast('Đang lưu tất cả...','info');const ids=[...GROUPS.flatMap(g=>[...Array(6).keys()].map(m=>'vb_'+g+'_'+m)),'tk_1','tk_2','tk_3','tk_4','bk_1','bk_2','ck_1'];let ok=0,err=0;for(const id of ids){try{const p=id+'_',ref=$(p+'t1');if(!ref)continue;const sheet=ref.dataset.s,row=+ref.dataset.r,ups=[{r:row,c:+ref.dataset.c,v:$(p+'t1').value.trim()},{r:row,c:+$(p+'s1').dataset.c,v:$(p+'s1').value!==''?+$(p+'s1').value:''},{r:row,c:+$(p+'t2').dataset.c,v:$(p+'t2').value.trim()},{r:row,c:+$(p+'s2').dataset.c,v:$(p+'s2').value!==''?+$(p+'s2').value:''}];await api(null,{method:'POST',body:{sheet,updates:ups}});ok++}catch(e){err++}}toast(ok+' thành công, '+err+' lỗi',err?'err':'ok');if(!err)setStatus(true)}
    
    async function loadAll(){toast('Đang tải dữ liệu...','info');try{const data=await api('getData');if(data.status==='error')throw new Error(data.message);if(data.bang)GROUPS.forEach(g=>{const gd=data.bang[g];if(!gd)return;for(let m=0;m<6;m++){const id='vb_'+g+'_'+m,p=id+'_',rd=gd[m];if(!rd)return;const e1=$(p+'t1'),e2=$(p+'s1'),e3=$(p+'t2'),e4=$(p+'s2');if(e1)e1.value=rd[2]||'';if(e2)e2.value=rd[3]!=null?rd[3]:'';if(e3)e3.value=rd[4]||'';if(e4)e4.value=rd[5]!=null?rd[5]:''}});if(data.tk?.length)data.tk.forEach((md,i)=>{if(!md)return;const p='tk_'+(i+1)+'_',r=md[0];if(!r)return;const e1=$(p+'t1'),e2=$(p+'s1'),e3=$(p+'t2'),e4=$(p+'s2');if(e1)e1.value=r[3]||'';if(e2)e2.value=r[4]!=null?r[4]:'';if(e3)e3.value=r[5]||'';if(e4)e4.value=r[6]!=null?r[6]:''});if(data.bk?.length)data.bk.forEach((md,i)=>{if(!md)return;const p='bk_'+(i+1)+'_',r=md[0];if(!r)return;const e1=$(p+'t1'),e2=$(p+'s1'),e3=$(p+'t2'),e4=$(p+'s2');if(e1)e1.value=r[2]||'';if(e2)e2.value=r[3]!=null?r[3]:'';if(e3)e3.value=r[4]||'';if(e4)e4.value=r[5]!=null?r[5]:''});if(data.ck?.length){const p='ck_1_',r=data.ck[0];if(r){const e1=$(p+'t1'),e2=$(p+'s1'),e3=$(p+'t2'),e4=$(p+'s2');if(e1)e1.value=r[1]||'';if(e2)e2.value=r[2]!=null?r[2]:'';if(e3)e3.value=r[3]||'';if(e4)e4.value=r[4]!=null?r[4]:''}}toast('✅ Tải thành công!','ok');setStatus(true)}catch(e){toast('Lỗi tải: '+e.message,'err');setStatus(false);console.error(e)}}
    
    function init(){initVB();initTK();initBK();initCK();testConnection()}
    init();
  </script>
</body>
</html>
