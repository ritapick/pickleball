<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOÀNG QUỐC VIỆT PICKLEBALL</title>

<!-- Font: Oswald for sports look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --primary-color: #00f2ff; /* Cyan Neon */
    --secondary-color: #ccff00; /* Lime Green */
    --bg-dark: #0a0a0a;
    --glass-bg: rgba(20, 20, 25, 0.85);
    --text-gradient: linear-gradient(90deg, #ffffff, #00f2ff);
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Oswald', sans-serif;
    background-color: var(--bg-dark);
    background-image: url('https://image.qwenlm.ai/public_source/4a049a49-0398-4b5b-93ea-9691e7b8a93e/16bfa2e7b-4d27-460a-835b-ffc3d74c517a.png'); /* Generated Sports BG */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Overlay to darken background for readability */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
    z-index: -1;
  }

  /* TOP BAR: Weather & Time */
  .top-bar {
    width: 100%;
    max-width: 480px;
    padding: 15px 20px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .weather-widget {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #ddd;
    text-shadow: 0 1px 2px black;
  }

  .time-widget {
    font-weight: 700;
    font-size: 18px;
    color: var(--primary-color);
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
  }

  /* MAIN CONTAINER */
  .main-wrapper {
    width: 100%;
    max-width: 480px;
    padding: 20px;
    box-sizing: border-box;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* TITLE SECTION */
  .title-box {
    text-align: center;
    margin-bottom: 50px;
    animation: slideDown 0.8s ease-out;
  }

  .main-title {
    font-size: 32px;
    font-weight: 700;
    text-transform: uppercase;
    margin: 0;
    background: var(--text-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    line-height: 1.1;
  }

  .sub-title {
    font-size: 20px;
    color: var(--secondary-color);
    font-weight: 600;
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .date-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 15px;
    border: 1px solid var(--primary-color);
    border-radius: 20px;
    font-size: 14px;
    color: white;
    background: rgba(0, 242, 255, 0.1);
    backdrop-filter: blur(5px);
  }

  /* IMAGE GRID */
  .card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
  }

  .card-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none; /* No underline */
    group: hover;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .card-item:hover {
    transform: translateY(-10px);
  }

  .img-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    background: #1a1a1a;
  }

  .card-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.3s;
  }

  .card-item:hover .img-wrapper {
    border-color: var(--primary-color);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
  }

  .card-label {
    margin-top: 15px;
    font-size: 18px;
    font-weight: 600;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px black;
    position: relative;
  }

  .card-label::after {
    content: '';
    display: block;
    width: 0%;
    height: 2px;
    background: var(--secondary-color);
    margin: 5px auto 0;
    transition: width 0.3s;
  }

  .card-item:hover .card-label::after {
    width: 100%;
  }

  /* FOOTER LINK */
  .footer-link {
    margin-top: 50px;
    text-align: center;
    animation: fadeInUp 1s ease-out;
  }

  .btn-facebook {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(45deg, #1877f2, #005bea);
    color: white;
    padding: 15px 30px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-facebook:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(24, 119, 242, 0.6);
    background: linear-gradient(45deg, #005bea, #1877f2);
  }

  /* Animations */
  @keyframes slideDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes fadeInUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Responsive adjustments */
  @media (max-width: 350px) {
    .main-title { font-size: 26px; }
    .card-label { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- TOP BAR: Weather & Time -->
<div class="top-bar">
  <div class="weather-widget" id="weather-display">
    <span id="weather-icon">☁️</span>
    <span id="weather-temp">--°C</span>
    <span style="font-size:12px; opacity:0.8;">Đức Trọng</span>
  </div>
  <div class="time-widget" id="clock-display">
    00:00
  </div>
</div>

<div class="main-wrapper">
  
  <!-- TITLE -->
  <div class="title-box">
    <h1 class="main-title">HOÀNG QUỐC VIỆT<br>PICKLEBALL</h1>
    <div class="sub-title">PICKLEBALL CUP</div>
    <div class="date-badge">02/05/2026</div>
  </div>

  <!-- 2 IMAGES SIDE BY SIDE -->
  <div class="card-container">

    <!-- Item 1: 48.png -->
    <a href="https://maps.app.goo.gl/uHF7XA7K7ybqBX4XA" class="card-item">
      <div class="img-wrapper">
        <img src="doinu.png" alt="Giải đấu 4.2" onerror="this.src='https://placehold.co/600x400/1a1a1a/FFF?text=4.2'">
      </div>
      <div class="card-label">ĐÔI NỮ</div>
    </a>

    <!-- Item 2: 52.png -->
    <a href="https://ritapick.github.io/pickleball/pick.5.2.html" class="card-item">
      <div class="img-wrapper">
        <img src="52.PNG" alt="Giải đấu 5.2" onerror="this.src='https://placehold.co/600x400/1a1a1a/FFF?text=5.2'">
      </div>
      <div class="card-label">ĐÔI NAM</div>
    </a>

  </div>

  

<script>
  // 1. Clock Functionality
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock-display').textContent = `${hours}:${minutes}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 2. Weather Simulation for Duc Trong, Lam Dong
  // Note: Real-time weather requires an API Key (OpenWeatherMap etc). 
  // Since this is a static frontend demo without backend proxy, we simulate realistic data for Duc Trong.
  // Duc Trong is typically mild/cool.
  
  function getSimulatedWeather() {
    const hour = new Date().getHours();
    let temp = 22; // Base temp
    let condition = "Mát mẻ";
    let icon = "☁️";

    // Simple logic: Warmer during day (11am - 2pm), cooler at night
    if (hour >= 11 && hour <= 14) {
      temp = 26;
      condition = "Nắng nhẹ";
      icon = "⛅";
    } else if (hour >= 15 && hour <= 18) {
      temp = 24;
      condition = "Có mây";
      icon = "🌤️";
    } else if (hour >= 19 || hour <= 6) {
      temp = 19;
      condition = "Se lạnh";
      icon = "🌙";
    }

    // Add slight randomness to make it feel alive on reload
    const randomVar = Math.floor(Math.random() * 3) - 1; 
    temp += randomVar;

    return { temp, icon };
  }

  function updateWeather() {
    const weatherData = getSimulatedWeather();
    document.getElementById('weather-temp').textContent = `${weatherData.temp}°C`;
    document.getElementById('weather-icon').textContent = weatherData.icon;
  }

  // Initialize weather
  updateWeather();

</script>

</body>
</html>
