<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 Giải Đấu Pickleball - Nhập Tỷ Số</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (giữ nguyên toàn bộ CSS như code gốc) ... */
        :root {
            --primary: #ff6b35;
            --primary-glow: rgba(255,107,53,0.4);
            --secondary: #00b4d8;
            --accent: #ffd166;
            --bg-dark: #0b0f19;
            --bg-card: #141a2b;
            --bg-card-hover: #1c2438;
            --border: rgba(255,255,255,0.06);
            --text: #e8ecf4;
            --text-dim: #7a8ba5;
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.3);
            --red: #ef4444;
            --purple: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 12px;
            padding-bottom: 30px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 15% 20%, rgba(255,107,53,0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 80%, rgba(0,180,216,0.06) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        .wrapper { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 16px 4px 14px; }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000; font-family: 'Oswald', sans-serif; font-weight: 700;
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
            padding: 4px 14px; border-radius: 20px; margin-bottom: 10px;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        header h1 {
            font-family: 'Oswald', sans-serif; font-size: clamp(1.5rem, 7vw, 2.2rem);
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            background: linear-gradient(135deg, #fff 20%, var(--accent), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.1;
        }
        header p { color: var(--text-dim); margin-top: 4px; font-size: 0.75rem; }
        .divider { width: 40px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); margin: 10px auto 0; border-radius: 2px; }
        .section { margin-bottom: 20px; }
        .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .section-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
        .icon-rank { background: linear-gradient(135deg, var(--primary), #ff9248); }
        .icon-match { background: linear-gradient(135deg, var(--secondary), #0096c7); }
        .section-head h2 { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .section-head h2 span { color: var(--accent); }
        .rank-wrap {
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .rank-table { width: 100%; border-collapse: collapse; min-width: 280px; font-size: 0.8rem; }
        .rank-table thead th {
            background: rgba(255,107,53,0.1); padding: 9px 6px; font-family: 'Oswald', sans-serif;
            font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.6px;
            text-align: center; color: var(--accent); border-bottom: 2px solid var(--primary);
            white-space: nowrap; position: sticky; top: 0;
        }
        .rank-table tbody tr { border-bottom: 1px solid var(--border); }
        .rank-table tbody tr:last-child { border-bottom: none; }
        .rank-table td { padding: 8px 6px; text-align: center; }
        .rank-table td:first-child { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.85rem; }
        .rank-table td:nth-child(2) { text-align: left; font-weight: 500; }
        .rank-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; }
        .r1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 0 6px rgba(255,215,0,0.3); }
        .r2 { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); color: #000; }
        .r3 { background: linear-gradient(135deg, #cd7f32, #a05a18); color: #fff; }
        .r0 { background: var(--bg-card-hover); color: var(--text-dim); }
        .match-grid { display: grid; gap: 10px; }
        .match-card {
            background: var(--bg-card); border-radius: 14px; border: 1.5px solid var(--border);
            overflow: hidden; transition: all 0.25s ease; animation: fadeUp 0.4s ease forwards; opacity: 0;
        }
        .match-card.saved { border-color: rgba(34,197,94,0.45); box-shadow: 0 0 16px rgba(34,197,94,0.1); }
        .match-card.syncing { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 16px rgba(139,92,246,0.15); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .mc-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.015); border-bottom: 1px solid var(--border); }
        .mc-round { font-family: 'Oswald', sans-serif; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); background: var(--bg-card-hover); padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border); }
        .mc-status { font-size: 0.58rem; font-weight: 600; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
        .mc-status.saved-badge { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
        .mc-status.pending-badge { background: rgba(255,209,102,0.1); color: var(--accent); border: 1px solid rgba(255,209,102,0.15); }
        .mc-body { padding: 14px 12px 10px; }
        .mc-teams { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .mc-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center; }
        .mc-team-label { font-size: 0.55rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .mc-team-names { font-weight: 600; font-size: 0.76rem; line-height: 1.35; }
        .mc-team-names .amp { display: block; color: var(--text-dim); font-weight: 400; font-size: 0.6rem; }
        .mc-vs { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; min-width: 96px; }
        .vs-circle { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.6rem; color: #000; }
        .mc-score-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .mc-score-row input[type="number"] {
            width: 44px; height: 36px; text-align: center; font-family: 'Oswald', sans-serif;
            font-size: 1.2rem; font-weight: 700; border-radius: 8px; border: 1.5px solid var(--border);
            background: var(--bg-card-hover); color: var(--text); outline: none; transition: all 0.2s;
            -moz-appearance: textfield;
        }
        .mc-score-row input[type="number"]::-webkit-outer-spin-button,
        .mc-score-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .mc-score-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.15); }
        .mc-score-row input.saved-input { border-color: var(--green); background: rgba(34,197,94,0.08); color: var(--green); }
        .mc-score-row input.error-input { border-color: var(--red); background: rgba(239,68,68,0.08); }
        .mc-score-row .dash { color: var(--text-dim); font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; }
        .mc-save-area { padding: 8px 12px 12px; display: flex; justify-content: center; }
        .mc-save-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; max-width: 260px; padding: 10px 20px; font-family: 'Oswald', sans-serif;
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
            color: #000; background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 12px var(--primary-glow);
        }
        .mc-save-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(255,107,53,0.4); }
        .mc-save-btn:active { transform: translateY(0) scale(0.98); }
        .mc-save-btn.btn-saved { background: linear-gradient(90deg, var(--green), #10b981); box-shadow: 0 3px 12px var(--green-glow); color: #fff; }
        .mc-save-btn.btn-syncing { background: linear-gradient(90deg, var(--purple), #7c3aed); box-shadow: 0 3px 12px rgba(139,92,246,0.3); color: #fff; pointer-events: none; }
        .mc-save-btn .btn-icon { font-size: 1.05rem; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
        .mc-save-btn.pulse { animation: pulse 1.5s ease 1; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .mc-save-btn.shake { animation: shake 0.4s ease; }
        @keyframes spinSlow { to { transform: rotate(360deg); } }
        .spinner-sm { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spinSlow 0.6s linear infinite; }
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px);
            z-index: 200; padding: 11px 22px; border-radius: 12px; font-family: 'Oswald', sans-serif;
            font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 28px rgba(0,0,0,0.3); max-width: 88vw; text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: linear-gradient(135deg, rgba(34,197,94,0.92), rgba(16,185,129,0.92)); color: #fff; }
        .toast.error { background: linear-gradient(135deg, rgba(239,68,68,0.92), rgba(220,38,38,0.92)); color: #fff; }
        .toast.warning { background: linear-gradient(135deg, rgba(255,209,102,0.95), rgba(245,158,11,0.95)); color: #000; }
        .toast.info { background: linear-gradient(135deg, rgba(139,92,246,0.92), rgba(124,58,237,0.92)); color: #fff; }
        .loader { display: flex; flex-direction: column; align-items: center; padding: 28px 12px; gap: 12px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spinSlow 0.7s linear infinite; }
        .loader-text { color: var(--text-dim); font-size: 0.78rem; }
        .err-box { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 16px 14px; text-align: center; }
        .err-box h3 { color: var(--red); margin-bottom: 4px; font-size: 0.85rem; }
        .err-box p { color: var(--text-dim); font-size: 0.75rem; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 2px; }
        @media (max-width: 380px) {
            .mc-team-names { font-size: 0.7rem; }
            .mc-score-row input[type="number"] { width: 40px; height: 33px; font-size: 1.1rem; }
            .mc-vs { min-width: 84px; }
            .mc-save-btn { padding: 9px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="badge">🏓 Robin Round</div>
        <h1>Giải Đấu Pickleball</h1>
        <p>Nhập tỷ số &amp; Lưu trực tiếp lên Google Sheets</p>
        <div class="divider"></div>
    </header>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-rank">🏆</div>
            <h2><span>Bảng Xếp Hạng</span></h2>
        </div>
        <div id="rank-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-match">✏️</div>
            <h2><span>Nhập Tỷ Số</span></h2>
        </div>
        <div id="match-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== CẤU HÌNH ====================
    // 🔴 THAY THẾ BẰNG ID GOOGLE SHEET CỦA BẠN
    const SHEET_ID = '1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek';
    
    // 🔴 THAY THẾ BẰNG WEB APP URL TỪ APPS SCRIPT
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNm0ukxNupK93Cefo77tf2C-x0Eb3pQGRaqxQZ4up7Puh5m_zaO5CMBk0BWg0d3Mo_0Q/exec';
    
    const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;
    
    // ⚠️ KHÔNG LƯU LOCAL STORAGE - CHỈ DÙNG ĐỂ HIỂN THỊ TẠM THỜI
    let serverScores = {}; 
    let matchData = [];

    // ==================== HÀM HỖ TRỢ ====================
    function getSheet(sheetName, range) {
        const url = `${BASE}?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
        return fetch(url).then(r => {
            if (!r.ok) throw new Error('Không kết nối được Google Sheets. Kiểm tra quyền chia sẻ Sheet.');
            return r.text();
        }).then(txt => {
            const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?$/);
            if (!m) throw new Error('Parse dữ liệu thất bại');
            return JSON.parse(m[1]);
        });
    }

    function val(row, ci) {
        if (!row.c || !row.c[ci] || row.c[ci].v == null) return '';
        return String(row.c[ci].v);
    }

    // ==================== RENDER UI ====================
    function renderRanking(data) {
        const el = document.getElementById('rank-area');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            el.innerHTML = '<div class="err-box"><h3>Không có dữ liệu xếp hạng</h3><p>Kiểm tra sheet "danhsachvdv"</p></div>';
            return;
        }
        const hdrs = t.cols.map(c => c.label || '');
        let h = '<div class="rank-wrap"><table class="rank-table"><thead><tr><th>#</th>';
        hdrs.forEach(x => { h += `<th>${x}</th>`; });
        h += '</tr></thead><tbody>';

        t.rows.forEach((row, i) => {
            const has = row.c && row.c.some(c => c && c.v !== '' && c.v !== null);
            if (!has) return;
            const rc = i < 3 ? `r${i+1}` : 'r0';
            h += `<tr><td><span class="rank-num ${rc}">${i+1}</span></td>`;
            for (let j = 0; j < hdrs.length; j++) {
                const cls = j === 1 ? ' style="text-align:left;font-weight:500"' : '';
                h += `<td${cls}>${val(row, j)}</td>`;
            }
            h += '</tr>';
        });

        h += '</tbody></table></div>';
        el.innerHTML = h;
    }

    function renderMatches(data) {
        const el = document.getElementById('match-area');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            el.innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3><p>Không tìm thấy lịch thi đấu trong sheet "lichthidau".</p></div>';
            return;
        }

        matchData = [];
        let count = 0;
        let h = '<div class="match-grid">';

        t.rows.forEach((row, idx) => {
            const has = row.c && row.c.some(c => c && c.v !== '' && c.v !== null);
            if (!has) return;
            count++;

            const round = val(row, 0);
            const t1p1 = val(row, 1);
            const t1p2 = val(row, 2);
            const t2p1 = val(row, 3);
            const t2p2 = val(row, 4);
            const existingS1 = val(row, 5);
            const existingS2 = val(row, 6);

            const matchId = `m${count}`;
            // Lưu thông tin match để dùng khi save
            matchData.push({ 
                id: matchId, 
                round, 
                t1p1, t1p2, t2p1, t2p2, 
                existingS1, existingS2, 
                rowIndex: idx + 2 // +2 vì data bắt đầu từ hàng 2
            });

            // Kiểm tra tỷ số đã có trên server
            const isSaved = (existingS1 !== '' && existingS2 !== '');
            const cardCls = isSaved ? 'saved' : '';
            const delay = Math.min(idx * 0.04, 1.5);
            const inputCls = isSaved ? 'saved-input' : '';
            const badgeCls = isSaved ? 'mc-status saved-badge' : 'mc-status pending-badge';
            const badgeTxt = isSaved ? 'Đã lưu ✓' : 'Chờ nhập';
            const btnCls = isSaved ? 'mc-save-btn btn-saved' : 'mc-save-btn';
            const btnIcon = isSaved ? '✓' : '💾';
            const btnTxt = isSaved ? 'Đã lưu' : 'Lưu tỷ số';

            h += `<div class="match-card ${cardCls}" style="animation-delay:${delay}s" id="${matchId}">`;
            h += `<div class="mc-head"><span class="mc-round">${round || 'Trận ' + count}</span><span class="${badgeCls}" id="status-${matchId}">${badgeTxt}</span></div>`;
            h += `<div class="mc-body"><div class="mc-teams">`;

            h += `<div class="mc-team"><span class="mc-team-label">Đội 1</span><div class="mc-team-names">${t1p1}<span class="amp">&amp;</span>${t1p2}</div></div>`;

            h += `<div class="mc-vs"><div class="vs-circle">VS</div>`;
            h += `<div class="mc-score-row">`;
            h += `<input type="number" class="${inputCls}" id="s1-${matchId}" placeholder="-" min="0" inputmode="numeric">`;
            h += `<span class="dash">-</span>`;
            h += `<input type="number" class="${inputCls}" id="s2-${matchId}" placeholder="-" min="0" inputmode="numeric">`;
            h += `</div></div>`;

            h += `<div class="mc-team"><span class="mc-team-label">Đội 2</span><div class="mc-team-names">${t2p1}<span class="amp">&amp;</span>${t2p2}</div></div>`;
            h += `</div></div>`;

            h += `<div class="mc-save-area">`;
            h += `<button class="${btnCls}" id="sbtn-${matchId}" onclick="saveSingleScore('${matchId}')">`;
            h += `<span class="btn-icon">${btnIcon}</span><span>${btnTxt}</span>`;
            h += `</button></div>`;
            h += `</div>`;
        });

        h += '</div>';
        el.innerHTML = h;

        // Fill giá trị đã có từ server vào input
        matchData.forEach(m => {
            if (m.existingS1 || m.existingS2) {
                const el1 = document.getElementById(`s1-${m.id}`);
                const el2 = document.getElementById(`s2-${m.id}`);
                if (el1 && m.existingS1) el1.value = m.existingS1;
                if (el2 && m.existingS2) el2.value = m.existingS2;
            }
        });
    }

    // ==================== XỬ LÝ NHẬP LIỆU ====================
    function onScoreInput(matchId) {
        // Reset trạng thái khi user chỉnh sửa
        const el1 = document.getElementById(`s1-${matchId}`);
        const el2 = document.getElementById(`s2-${matchId}`);
        if (el1) el1.classList.remove('error-input');
        if (el2) el2.classList.remove('error-input');
    }

    function resetMatchState(matchId) {
        const el1 = document.getElementById(`s1-${matchId}`);
        const el2 = document.getElementById(`s2-${matchId}`);
        const statusEl = document.getElementById(`status-${matchId}`);
        const cardEl = document.getElementById(matchId);
        const sbtn = document.getElementById(`sbtn-${matchId}`);

        if (el1) el1.classList.remove('saved-input', 'error-input');
        if (el2) el2.classList.remove('saved-input', 'error-input');
        if (cardEl) cardEl.classList.remove('saved');
        if (statusEl) {
            statusEl.className = 'mc-status pending-badge';
            statusEl.textContent = 'Chờ nhập';
        }
        if (sbtn) {
            sbtn.className = 'mc-save-btn';
            sbtn.innerHTML = '<span class="btn-icon">💾</span><span>Lưu tỷ số</span>';
        }
    }

    // ==================== LƯU LÊN GOOGLE SHEETS ====================
    async function saveSingleScore(matchId) {
        const el1 = document.getElementById(`s1-${matchId}`);
        const el2 = document.getElementById(`s2-${matchId}`);
        const statusEl = document.getElementById(`status-${matchId}`);
        const cardEl = document.getElementById(matchId);
        const sbtn = document.getElementById(`sbtn-${matchId}`);

        if (!el1 || !el2 || !sbtn) return;

        const v1 = el1.value.trim();
        const v2 = el2.value.trim();

        // Reset UI
        el1.classList.remove('saved-input', 'error-input');
        el2.classList.remove('saved-input', 'error-input');
        sbtn.classList.remove('shake');

        // Validate input
        if (v1 === '' && v2 === '') {
            showToast('⚠️ Vui lòng nhập tỷ số', 'warning');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }
        if (v1 === '' || v2 === '') {
            showToast('⚠️ Vui lòng nhập đủ 2 tỷ số', 'warning');
            if (v1 === '') el1.classList.add('error-input');
            if (v2 === '') el2.classList.add('error-input');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }
        const n1 = parseInt(v1);
        const n2 = parseInt(v2);
        if (isNaN(n1) || isNaN(n2) || n1 < 0 || n2 < 0) {
            el1.classList.add('error-input');
            el2.classList.add('error-input');
            showToast('⚠️ Tỷ số phải là số không âm', 'warning');
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            return;
        }

        const match = matchData.find(m => m.id === matchId);
        if (!match) {
            showToast('⚠️ Không tìm thấy thông tin trận', 'warning');
            return;
        }

        // Hiển thị trạng thái đang lưu
        const originalBtnHtml = sbtn.innerHTML;
        sbtn.className = 'mc-save-btn btn-syncing';
        sbtn.innerHTML = '<div class="spinner-sm"></div><span>Đang lưu...</span>';
        cardEl.classList.add('syncing');
        sbtn.disabled = true;

        try {
            // Gửi request đến Apps Script
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Quan trọng: Apps Script yêu cầu no-cors
                headers: { 'Content-Type': 'text/plain' }, // Tránh preflight OPTIONS
                body: JSON.stringify({
                    action: 'saveScore',
                    matchId: matchId,
                    rowIndex: match.rowIndex,
                    score1: n1,
                    score2: n2
                })
            });

            // Vì no-cors không đọc được response, ta giả định thành công
            // Cập nhật UI
            el1.classList.add('saved-input');
            el2.classList.add('saved-input');
            cardEl.classList.remove('syncing');
            cardEl.classList.add('saved');
            if (statusEl) {
                statusEl.className = 'mc-status saved-badge';
                statusEl.textContent = 'Đã lưu ✓';
            }
            sbtn.className = 'mc-save-btn btn-saved pulse';
            sbtn.innerHTML = '<span class="btn-icon">✓</span><span>Đã lưu</span>';
            setTimeout(() => { if (sbtn) sbtn.classList.remove('pulse'); }, 1500);

            showToast(`✅ Đã lưu ${n1} - ${n2} lên Google Sheets`, 'success');

            // Reload dữ liệu để cập nhật bảng xếp hạng (nếu có công thức)
            setTimeout(() => loadData(), 1500);

        } catch(e) {
            console.error('Save error:', e);
            cardEl.classList.remove('syncing');
            sbtn.className = 'mc-save-btn';
            sbtn.innerHTML = originalBtnHtml;
            sbtn.disabled = false;
            sbtn.classList.add('shake');
            setTimeout(() => sbtn.classList.remove('shake'), 400);
            showToast('❌ Lỗi kết nối. Kiểm tra Apps Script URL & quyền truy cập.', 'error');
        }
    }

    // ==================== TOAST NOTIFICATION ====================
    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => { toast.classList.remove('show'); }, 2800);
    }

    // ==================== LOAD DỮ LIỆU TỪ SHEET ====================
    async function loadData() {
        try {
            const [rankRes, matchRes] = await Promise.all([
                getSheet('danhsachvdv', 'E1:I25'),
                getSheet('lichthidau', 'A2:G100')
            ]);
            renderRanking(rankRes);
            renderMatches(matchRes);
        } catch (e) {
            console.error(e);
            const errMsg = `<div class="err-box"><h3>⚠️ Lỗi tải dữ liệu</h3><p>${e.message}</p><p style="margin-top:6px;font-size:0.72rem;">✅ Kiểm tra:<br>1. Sheet chia sẻ "Bất kỳ ai có link"<br>2. Tên sheet đúng: danhsachvdv, lichthidau<br>3. Kết nối internet</p></div>`;
            document.getElementById('rank-area').innerHTML = errMsg;
            document.getElementById('match-area').innerHTML = errMsg;
        }
    }

    // ==================== INIT ====================
    async function init() {
        // Không load từ localStorage - luôn lấy từ server
        await loadData();
        
        // Auto-refresh mỗi 30 giây để cập nhật tỷ số mới
        setInterval(() => {
            // Chỉ reload match data để tránh flicker bảng xếp hạng
            getSheet('lichthidau', 'A2:G100')
                .then(renderMatches)
                .catch(e => console.log('Auto-refresh error:', e));
        }, 30000);
    }

    // Khởi chạy khi DOM ready
    document.addEventListener('DOMContentLoaded', init);
</script>
